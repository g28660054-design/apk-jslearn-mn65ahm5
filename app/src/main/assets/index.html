{t:"CSS Grid: практика layout",c:"css",th:`<h3>Grid макет</h3><p>CSS Grid идеален для двумерных макетов. Можно определить области:</p><pre>grid-template-areas:
  "header header"
  "nav main"
  "footer footer";</pre><p>Каждому элементу назначаем <code>grid-area: header;</code></p><h3>Преимущества Grid</h3><ul><li>Двумерное расположение (строки + столбцы)</li><li>Именованные области</li><li>Простое позиционирование</li><li>auto-fill/auto-fit для адаптивных сеток</li></ul>`,cd:`<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Arial;min-height:100vh;display:grid;grid-template-rows:auto auto 1fr auto;grid-template-columns:200px 1fr;grid-template-areas:"hd hd" "nav main" "nav main" "ft ft";gap:5px;background:#dfe6e9}
  header{grid-area:hd;background:#6c5ce7;color:#fff;padding:15px;text-align:center}
  nav{grid-area:nav;background:#2d3436;color:#fff;padding:15px}
  nav a{display:block;color:#74b9ff;padding:8px;text-decoration:none;border-radius:5px;margin:3px 0}
  nav a:hover{background:#636e72}
  main{grid-area:main;padding:15px}
  footer{grid-area:ft;background:#2d3436;color:#fff;text-align:center;padding:12px}
  .grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .gc{background:#fff;padding:15px;border-radius:8px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
  @media(max-width:500px){body{grid-template-columns:1fr;grid-template-areas:"hd" "nav" "main" "ft"}}
</style></head><body>
  <header><h1>Grid Layout</h1></header>
  <nav><h3>Меню</h3><a href="#">Главная</a><a href="#">Блог</a><a href="#">Проекты</a><a href="#">Контакты</a></nav>
  <main>
    <h2>Карточки</h2>
    <div class="grid-cards">
      <div class="gc" style="background:#e17055;color:#fff">1</div>
      <div class="gc" style="background:#00b894;color:#fff">2</div>
      <div class="gc" style="background:#0984e3;color:#fff">3</div>
      <div class="gc" style="background:#6c5ce7;color:#fff">4</div>
      <div class="gc" style="background:#fdcb6e">5</div>
      <div class="gc" style="background:#e84393;color:#fff">6</div>
    </div>
  </main>
  <footer>&copy; 2024 Grid Layout</footer>
</body></html>`,md:"html"},
{t:"CSS тени и эффекты",c:"css",th:`<h3>box-shadow</h3><pre>box-shadow: x y blur spread color;
box-shadow: 0 4px 15px rgba(0,0,0,0.3);</pre><p>Можно указать несколько теней через запятую. <code>inset</code> — внутренняя тень.</p><h3>text-shadow</h3><pre>text-shadow: 2px 2px 4px rgba(0,0,0,0.5);</pre><h3>Фильтры</h3><pre>filter: blur(5px);
filter: brightness(1.5);
filter: grayscale(100%);
filter: drop-shadow(...);</pre><h3>backdrop-filter</h3><p>Эффект размытия фона: <code>backdrop-filter: blur(10px);</code></p>`,cd:`<!DOCTYPE html>
<html><head><style>
  body{padding:15px;font-family:Arial;background:#1a1a2e;color:#fff}
  .box{display:inline-block;width:120px;height:80px;margin:10px;border-radius:10px;text-align:center;line-height:80px;font-size:12px}
  .s1{background:#6c5ce7;box-shadow:0 5px 15px rgba(108,92,231,0.5)}
  .s2{background:#e74c3c;box-shadow:0 0 20px #e74c3c,0 0 40px rgba(231,76,60,0.3)}
  .s3{background:#fff;color:#333;box-shadow:inset 0 0 20px rgba(0,0,0,0.3)}
  .s4{background:#2ecc71;box-shadow:5px 5px 0 #27ae60,-5px -5px 0 #2ecc71}
  .text1{font-size:28px;text-shadow:2px 2px 4px rgba(0,0,0,0.5);margin:15px}
  .text2{font-size:28px;text-shadow:0 0 10px #0ff,0 0 20px #0ff;color:#fff;margin:15px}
  .img-filter{display:inline-block;margin:5px;border-radius:8px;overflow:hidden;width:80px;height:80px;background:#6c5ce7}
  .f1{filter:blur(2px)}.f2{filter:grayscale(100%)}.f3{filter:brightness(1.5)}.f4{filter:hue-rotate(90deg)}.f5{filter:sepia(100%)}
  .glass{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);padding:20px;border-radius:10px;margin:15px 0;border:1px solid rgba(255,255,255,0.2)}
</style></head><body>
  <h3>Box Shadows</h3>
  <div class="box s1">Мягкая</div><div class="box s2">Неон</div><div class="box s3">Inset</div><div class="box s4">Двойная</div>
  <h3>Text Shadow</h3>
  <div class="text1">Мягкая тень</div><div class="text2">Неоновый текст</div>
  <h3>Filters</h3>
  <div class="img-filter f1">blur</div><div class="img-filter f2">gray</div><div class="img-filter f3">bright</div><div class="img-filter f4">hue</div><div class="img-filter f5">sepia</div>
  <div class="glass"><h3>Glassmorphism</h3><p>backdrop-filter: blur(10px)</p></div>
</body></html>`,md:"html"},
{t:"CSS Flexbox: выравнивание",c:"css",th:`<h3>Центрирование с Flexbox</h3><p>Самый простой способ центрировать элемент:</p><pre>display: flex;
justify-content: center;
align-items: center;</pre><h3>align-self</h3><p>Индивидуальное выравнивание элемента.</p><h3>order</h3><p>Меняет визуальный порядок элементов без изменения HTML.</p><h3>flex-basis, flex-grow, flex-shrink</h3><p>Краткая запись: <code>flex: grow shrink basis;</code></p><p><code>flex: 1</code> = <code>flex: 1 1 0%</code> — заполнить всё доступное пространство.</p>`,cd:`<!DOCTYPE html>
<html><head><style>
  body{padding:10px;font-family:Arial;font-size:13px;background:#f0f0f0}
  .demo{background:#1a1a2e;padding:10px;margin:10px 0;border-radius:8px;display:flex;min-height:100px}
  .demo div{color:#fff;padding:10px;border-radius:5px;text-align:center;margin:4px}
  .center{justify-content:center;align-items:center}
  .center div{background:#6c5ce7}
  .self{align-items:flex-start}
  .self .mid{align-self:center;background:#e74c3c!important}
  .self .bot{align-self:flex-end;background:#2ecc71!important}
  .self div{background:#3498db}
  .order div:nth-child(1){order:3;background:#e74c3c}
  .order div:nth-child(2){order:1;background:#2ecc71}
  .order div:nth-child(3){order:2;background:#3498db}
  .grow{gap:8px}
  .grow .g1{flex:1;background:#e74c3c}
  .grow .g2{flex:2;background:#6c5ce7}
  .grow .g3{flex:1;background:#2ecc71}
</style></head><body>
  <h3>Центрирование</h3>
  <div class="demo center"><div>Центр!</div></div>
  <h3>align-self</h3>
  <div class="demo self"><div>start</div><div class="mid">center</div><div class="bot">end</div></div>
  <h3>order (визуальный порядок)</h3>
  <div class="demo order"><div>HTML:1 order:3</div><div>HTML:2 order:1</div><div>HTML:3 order:2</div></div>
  <h3>flex-grow</h3>
  <div class="demo grow"><div class="g1">flex:1</div><div class="g2">flex:2</div><div class="g3">flex:1</div></div>
</body></html>`,md:"html"},
{t:"CSS transitions подробно",c:"css",th:`<h3>Transition свойства</h3><ul><li><code>transition-property</code> — какое свойство анимировать (all, width, color...)</li><li><code>transition-duration</code> — длительность (0.3s, 500ms)</li><li><code>transition-timing-function</code> — кривая (ease, linear, ease-in-out, cubic-bezier)</li><li><code>transition-delay</code> — задержка</li></ul><p>Краткая запись: <code>transition: property duration timing delay;</code></p><p>Transition работает при изменении CSS-свойства (hover, класс, JS).</p>`,cd:`<!DOCTYPE html>
<html><head><style>
  body{padding:15px;font-family:Arial;background:#1a1a2e;color:#fff}
  .box{width:100px;height:60px;margin:10px;display:inline-block;border-radius:8px;text-align:center;line-height:60px;font-size:11px;cursor:pointer;color:#fff}
  .b1{background:#e74c3c;transition:width 0.5s ease}
  .b1:hover{width:250px}
  .b2{background:#6c5ce7;transition:transform 0.3s ease,border-radius 0.3s}
  .b2:hover{transform:rotate(180deg) scale(1.2);border-radius:50%}
  .b3{background:#2ecc71;transition:all 0.4s cubic-bezier(0.68,-0.55,0.265,1.55)}
  .b3:hover{transform:translateY(-20px);box-shadow:0 20px 30px rgba(46,204,113,0.4)}
  .b4{background:#3498db;transition:background 0.3s,color 0.3s,transform 0.3s}
  .b4:hover{background:#fff;color:#3498db;transform:scale(1.1)}
  .bar{height:30px;background:#e74c3c;border-radius:15px;transition:width 1s ease;width:30px;margin:10px 0;line-height:30px;text-align:center;font-size:12px;cursor:pointer}
  .bar:hover{width:100%}
</style></head><body>
  <h3>Наведите мышкой:</h3>
  <div class="box b1">Ширина</div>
  <div class="box b2">Вращение</div>
  <div class="box b3">Bounce</div>
  <div class="box b4">Цвета</div>
  <h3>Прогресс-бар</h3>
  <div class="bar">Наведи →</div>
  <div class="bar" style="background:#6c5ce7;transition-duration:2s">Медленный →</div>
  <div class="bar" style="background:#2ecc71;transition-timing-function:linear">Linear →</div>
</body></html>`,md:"html"},
{t:"Итераторы и генераторы",c:"js",th:`<h3>Итераторы</h3><p>Объект с методом <code>next()</code>, возвращающим <code>{value, done}</code>.</p><p>Протокол итерации: объект с <code>[Symbol.iterator]()</code>.</p><h3>Генераторы</h3><p>Функция с <code>*</code> и <code>yield</code>:</p><pre>function* gen() {
  yield 1;
  yield 2;
  yield 3;
}
let g = gen();
g.next(); // {value:1, done:false}</pre><p>Генераторы создают ленивые последовательности.</p>`,cd:`function* range(start, end, step = 1) {
  for (let i = start; i <= end; i += step) {
    yield i;
  }
}

console.log("range(1,5):");
for (let n of range(1, 5)) {
  console.log("  " + n);
}

console.log("\\nrange(0,20,5):", [...range(0, 20, 5)]);

function* fibonacci() {
  let a = 0, b = 1;
  while (true) {
    yield a;
    [a, b] = [b, a + b];
  }
}

console.log("\\nФибоначчи (первые 10):");
let fib = fibonacci();
for (let i = 0; i < 10; i++) {
  console.log("  " + fib.next().value);
}

function* idMaker(prefix = "id") {
  let n = 1;
  while (true) yield prefix + "_" + n++;
}
let ids = idMaker("user");
console.log("\\nID:", ids.next().value);
console.log("ID:", ids.next().value);
console.log("ID:", ids.next().value);

let myIterable = {
  data: ["a", "b", "c"],
  [Symbol.iterator]() {
    let i = 0;
    return {
      next: () => i < this.data.length
        ? {value: this.data[i++], done: false}
        : {done: true}
    };
  }
};
console.log("\\nCustom iterable:", [...myIterable]);`,md:"js"},
{t:"Работа с JSON",c:"js",th:`<h3>JSON</h3><p>JavaScript Object Notation — формат обмена данными.</p><h3>Методы</h3><ul><li><code>JSON.stringify(obj)</code> — объект → JSON строка</li><li><code>JSON.parse(str)</code> — JSON строка → объект</li></ul><h3>Правила JSON</h3><ul><li>Ключи — строки в двойных кавычках</li><li>Значения: строки, числа, boolean, null, массивы, объекты</li><li>Нет функций, undefined, комментариев</li></ul><p><code>JSON.stringify(obj, null, 2)</code> — форматированный вывод.</p>`,cd:`let user = {
  name: "Анна",
  age: 25,
  hobbies: ["чтение", "спорт", "код"],
  address: { city: "Москва", zip: "101000" }
};

let json = JSON.stringify(user, null, 2);
console.log("JSON.stringify:");
console.log(json);

let parsed = JSON.parse(json);
console.log("\\nJSON.parse:");
console.log("Имя:", parsed.name);
console.log("Хобби:", parsed.hobbies);
console.log("Город:", parsed.address.city);

let arr = [
  {id: 1, name: "HTML", done: true},
  {id: 2, name: "CSS", done: true},
  {id: 3, name: "JS", done: false}
];
let jsonArr = JSON.stringify(arr);
console.log("\\nМассив в JSON:", jsonArr);

let back = JSON.parse(jsonArr);
back.forEach(item => {
  console.log((item.done ? "✓" : "○") + " " + item.name);
});

let filtered = JSON.stringify(user, ["name", "age"]);
console.log("\\nС фильтром полей:", filtered);

let custom = JSON.stringify(user, (key, val) => {
  if (key === "age") return val + " лет";
  return val;
});
console.log("С replacer:", custom);`,md:"js"},
{t:"Делегирование событий",c:"js",th:`<h3>Делегирование</h3><p>Вместо привязки обработчика к каждому элементу — привязываем к родителю и проверяем <code>event.target</code>.</p><h3>Преимущества</h3><ul><li>Работает для динамически созданных элементов</li><li>Меньше обработчиков = лучше производительность</li><li>Легче управлять</li></ul><pre>parent.addEventListener("click", (e) => {
  if (e.target.matches(".item")) {
    // обработка
  }
});</pre><p><code>e.target.closest(".selector")</code> — найти ближайший родительский элемент.</p>`,cd:`document.body.innerHTML = \`
  <style>
    body{font-family:Arial;padding:15px}
    #list{list-style:none;padding:0}
    #list li{display:flex;justify-content:space-between;align-items:center;background:#f0f0f0;padding:10px;margin:5px 0;border-radius:5px;cursor:pointer;transition:.2s}
    #list li:hover{background:#dfe6e9}
    #list li.done{text-decoration:line-through;opacity:0.5}
    .del{background:#e74c3c;color:#fff;border:none;padding:4px 10px;border-radius:3px;cursor:pointer}
    button{padding:8px 15px;border:none;color:#fff;border-radius:5px;cursor:pointer;margin:3px}
  </style>
  <h2>Todo (делегирование)</h2>
  <input id="inp" placeholder="Новая задача" style="padding:8px;width:200px">
  <button style="background:#6c5ce7" id="add">Добавить</button>
  <button style="background:#e74c3c" id="clear">Очистить</button>
  <ul id="list"></ul>
  <p id="info"></p>
\`;
let list = document.getElementById("list");
let items = ["Выучить HTML", "Выучить CSS", "Выучить JS"];
function render() {
  list.innerHTML = items.map((t,i) => '<li data-i="'+i+'"><span>'+t+'</span><button class="del" data-i="'+i+'">✕</button></li>').join("");
  document.getElementById("info").textContent = "Задач: " + items.length;
}
render();
list.addEventListener("click", e => {
  let li = e.target.closest("li");
  if (!li) return;
  if (e.target.classList.contains("del")) {
    items.splice(+e.target.dataset.i, 1);
    render();
  } else {
    li.classList.toggle("done");
  }
});
document.getElementById("add").onclick = () => {
  let v = document.getElementById("inp").value.trim();
  if (v) { items.push(v); document.getElementById("inp").value = ""; render(); }
};
document.getElementById("clear").onclick = () => { items = []; render(); };`,md:"js"},
{t:"Intersection Observer",c:"js",th:`<h3>Intersection Observer API</h3><p>Позволяет отслеживать видимость элементов в viewport (области просмотра).</p><pre>let observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      // элемент видим
    }
  });
}, { threshold: 0.5 });
observer.observe(element);</pre><h3>Применение</h3><ul><li>Ленивая загрузка (lazy loading)</li><li>Анимация при скролле</li><li>Бесконечная прокрутка</li><li>Аналитика видимости</li></ul>`,cd:`document.body.innerHTML = \`
  <style>
    body{font-family:Arial;padding:10px}
    .card{opacity:0;transform:translateY(40px);transition:all 0.6s ease;padding:20px;margin:20px 0;border-radius:10px;color:#fff;font-size:16px}
    .card.visible{opacity:1;transform:translateY(0)}
    .spacer{height:150px;display:flex;align-items:center;justify-content:center;color:#999}
  </style>
  <h2 style="text-align:center">Прокрутите вниз ↓</h2>
  <div class="spacer">Скролльте...</div>
  <div class="card" style="background:#6c5ce7">Карточка 1 — появляется при скролле</div>
  <div class="spacer">Ещё ниже...</div>
  <div class="card" style="background:#e74c3c">Карточка 2 — анимация при видимости</div>
  <div class="spacer">Продолжайте...</div>
  <div class="card" style="background:#00b894">Карточка 3 — Intersection Observer</div>
  <div class="spacer">Ещё немного...</div>
  <div class="card" style="background:#e17055">Карточка 4 — последняя!</div>
  <div class="spacer">Конец 🎉</div>
\`;
let observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    }
  });
}, { threshold: 0.3 });
document.querySelectorAll(".card").forEach(card => observer.observe(card));`,md:"js"},
{t:"Drag and Drop",c:"js",th:`<h3>HTML Drag and Drop API</h3><h3>События</h3><ul><li><code>dragstart</code> — начало перетаскивания</li><li><code>drag</code> — во время перетаскивания</li><li><code>dragenter</code> — курсор вошёл в зону</li><li><code>dragover</code> — курсор над зоной (нужен preventDefault)</li><li><code>dragleave</code> — курсор покинул зону</li><li><code>drop</code> — элемент отпущен</li><li><code>dragend</code> — перетаскивание завершено</li></ul><p>Атрибут <code>draggable="true"</code> делает элемент перетаскиваемым.</p>`,cd:`document.body.innerHTML = \`
  <style>
    body{font-family:Arial;padding:15px}
    .zones{display:flex;gap:15px;flex-wrap:wrap}
    .zone{flex:1;min-width:120px;min-height:150px;background:#f0f0f0;border:2px dashed #ccc;border-radius:10px;padding:10px;transition:.2s}
    .zone.over{border-color:#6c5ce7;background:#f0eeff}
    .item{background:#6c5ce7;color:#fff;padding:8px 12px;margin:5px 0;border-radius:5px;cursor:grab;font-size:13px}
    .item:active{cursor:grabbing}
    h3{text-align:center;margin-bottom:4px;font-size:14px;color:#555}
  </style>
  <h2>Drag and Drop</h2>
  <div class="zones">
    <div class="zone" id="z1"><h3>Зона 1</h3><div class="item" draggable="true">Элемент A</div><div class="item" draggable="true">Элемент B</div><div class="item" draggable="true">Элемент C</div></div>
    <div class="zone" id="z2"><h3>Зона 2</h3></div>
    <div class="zone" id="z3"><h3>Зона 3</h3></div>
  </div>
\`;
let dragged = null;
document.addEventListener("dragstart", e => {
  if (e.target.classList.contains("item")) {
    dragged = e.target;
    e.target.style.opacity = "0.4";
  }
});
document.addEventListener("dragend", e => {
  if (e.target.classList.contains("item")) e.target.style.opacity = "1";
});
document.querySelectorAll(".zone").forEach(zone => {
  zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("over"); });
  zone.addEventListener("dragleave", () => zone.classList.remove("over"));
  zone.addEventListener("drop", e => {
    e.preventDefault();
    zone.classList.remove("over");
    if (dragged) zone.appendChild(dragged);
  });
});`,md:"js"},
{t:"Web Storage и cookies",c:"js",th:`<h3>Сравнение хранилищ</h3><table border="1" cellpadding="5" style="font-size:13px"><tr><th></th><th>localStorage</th><th>sessionStorage</th><th>Cookies</th></tr><tr><td>Размер</td><td>~5-10MB</td><td>~5MB</td><td>~4KB</td></tr><tr><td>Срок</td><td>Вечно</td><td>До закрытия</td><td>Настраиваемый</td></tr><tr><td>Отправка</td><td>Нет</td><td>Нет</td><td>Каждый запрос</td></tr></table><h3>Cookies</h3><pre>document.cookie = "name=value; max-age=3600; path=/";</pre><p>Cookies отправляются на сервер с каждым запросом.</p>`,cd:`console.log("=== localStorage ===");
localStorage.setItem("theme", "dark");
localStorage.setItem("lang", "ru");
console.log("theme:", localStorage.getItem("theme"));
console.log("lang:", localStorage.getItem("lang"));

console.log("\\n=== sessionStorage ===");
sessionStorage.setItem("page", "lessons");
sessionStorage.setItem("scroll", "250");
console.log("page:", sessionStorage.getItem("page"));
console.log("scroll:", sessionStorage.getItem("scroll"));

console.log("\\n=== Cookies ===");
document.cookie = "user=Анна; max-age=3600; path=/";
document.cookie = "role=student; max-age=3600; path=/";

function getCookie(name) {
  let match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
  return match ? match[2] : null;
}
console.log("user cookie:", getCookie("user"));

console.log("\\n=== Сравнение размеров ===");
let testData = "x".repeat(1000);

console.log("Записано 1KB в localStorage");

console.log("\\nВсе ключи localStorage:");
for (let i = 0; i < localStorage.length; i++) {
  let k = localStorage.key(i);

}`,md:"js"},
{t:"Проект: Калькулятор",c:"js",th:`<h3>Проект: Калькулятор</h3><p>Создадим полнофункциональный калькулятор с кнопками и экраном.</p><h3>Функции</h3><ul><li>Ввод цифр и десятичной точки</li><li>Операции: +, -, ×, ÷</li><li>Вычисление результата (=)</li><li>Очистка (C) и удаление последнего символа</li><li>Поддержка клавиатуры</li></ul><p>Это отличная практика для работы с DOM, событиями и логикой.</p>`,cd:`document.body.innerHTML = \`
  <style>
    body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:Arial;margin:0}
    .calc{background:#2d2d4e;border-radius:15px;padding:15px;width:260px;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
    #display{width:100%;background:#0d0d2b;color:#fff;border:none;text-align:right;font-size:28px;padding:15px;border-radius:10px;box-sizing:border-box;margin-bottom:10px}
    .btns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .btn{padding:15px;font-size:18px;border:none;border-radius:8px;cursor:pointer;transition:.1s;color:#fff}
    .btn:active{transform:scale(0.95)}
    .num{background:#3d3d5c}
    .op{background:#6c5ce7}
    .eq{background:#00b894}
    .clr{background:#e74c3c}
  </style>
  <div class="calc">
    <input id="display" readonly value="0">
    <div class="btns">
      <button class="btn clr" data-v="C">C</button>
      <button class="btn clr" data-v="CE">CE</button>
      <button class="btn op" data-v="%">%</button>
      <button class="btn op" data-v="/">÷</button>
      <button class="btn num" data-v="7">7</button>
      <button class="btn num" data-v="8">8</button>
      <button class="btn num" data-v="9">9</button>
      <button class="btn op" data-v="*">×</button>
      <button class="btn num" data-v="4">4</button>
      <button class="btn num" data-v="5">5</button>
      <button class="btn num" data-v="6">6</button>
      <button class="btn op" data-v="-">−</button>
      <button class="btn num" data-v="1">1</button>
      <button class="btn num" data-v="2">2</button>
      <button class="btn num" data-v="3">3</button>
      <button class="btn op" data-v="+">+</button>
      <button class="btn num" data-v="0" style="grid-column:span 2">0</button>
      <button class="btn num" data-v=".">.</button>
      <button class="btn eq" data-v="=">=</button>
    </div>
  </div>
\`;
let d = document.getElementById("display");
let cur = "0", prev = "", op = "", reset = false;
function update() { d.value = cur; }
document.querySelector(".btns").addEventListener("click", e => {
  let b = e.target.closest(".btn");
  if (!b) return;
  let v = b.dataset.v;
  if (v === "C") { cur = "0"; prev = ""; op = ""; }
  else if (v === "CE") { cur = cur.length > 1 ? cur.slice(0, -1) : "0"; }
  else if ("0123456789".includes(v)) { if (cur === "0" || reset) { cur = v; reset = false; } else cur += v; }
  else if (v === ".") { if (!cur.includes(".")) cur += "."; }
  else if ("+-*/% ".includes(v)) { prev = cur; op = v; reset = true; }
  else if (v === "=") { try { let r = Function("return " + prev + op + cur)(); cur = String(parseFloat(r.toFixed(10))); } catch(e) { cur = "Ошибка"; } prev = ""; op = ""; reset = true; }
  update();
});`,md:"js"},
{t:"Проект: Todo App",c:"js",th:`<h3>Проект: Todo приложение</h3><p>Создадим полноценное приложение для управления задачами.</p><h3>Функции</h3><ul><li>Добавление задач</li><li>Отметка выполнения</li><li>Удаление задач</li><li>Фильтрация: все/активные/выполненные</li><li>Счётчик задач</li><li>Сохранение в localStorage</li></ul><p>Этот проект объединяет DOM, события, localStorage и CSS.</p>`,cd:`document.body.innerHTML = \`
  <style>
    *{box-sizing:border-box;margin:0}
    body{font-family:Arial;background:#1a1a2e;min-height:100vh;display:flex;justify-content:center;padding:20px}
    .app{width:100%;max-width:400px}
    h1{color:#6c5ce7;text-align:center;margin-bottom:15px}
    .add{display:flex;gap:8px;margin-bottom:15px}
    .add input{flex:1;padding:10px;border:2px solid #333;border-radius:8px;background:#2d2d4e;color:#fff;font-size:14px}
    .add button{padding:10px 18px;background:#6c5ce7;color:#fff;border:none;border-radius:8px;cursor:pointer}
    .filters{display:flex;gap:5px;margin-bottom:10px}
    .filters button{flex:1;padding:6px;background:#2d2d4e;color:#aaa;border:1px solid #444;border-radius:5px;cursor:pointer;font-size:12px}
    .filters button.active{background:#6c5ce7;color:#fff;border-color:#6c5ce7}
    .item{display:flex;align-items:center;gap:10px;background:#2d2d4e;padding:10px;margin:5px 0;border-radius:8px;color:#fff}
    .item.done span{text-decoration:line-through;opacity:0.5}
    .item input[type=checkbox]{width:18px;height:18px}
    .item span{flex:1;font-size:14px}
    .item button{background:#e74c3c;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer}
    .info{color:#888;text-align:center;margin-top:10px;font-size:13px}
  </style>
  <div class="app">
    <h1>Todo App</h1>
    <div class="add"><input id="inp" placeholder="Новая задача..."><button id="addBtn">+</button></div>
    <div class="filters"><button class="active" data-f="all">Все</button><button data-f="active">Активные</button><button data-f="done">Выполненные</button></div>
    <div id="list"></div>
    <div class="info" id="info"></div>
  </div>
\`;
let todos = JSON.parse(localStorage.getItem("todos2") || "[]");
let filter = "all";
function save() { localStorage.setItem("todos2", JSON.stringify(todos)); }
function render() {
  let f = filter === "all" ? todos : todos.filter(t => filter === "done" ? t.done : !t.done);
  document.getElementById("list").innerHTML = f.map((t,i) =>
    '<div class="item'+(t.done?" done":"")+'"><input type="checkbox" '+(t.done?"checked":"")+" data-i="+todos.indexOf(t)+"><span>"+t.text+"</span><button data-i="+todos.indexOf(t)+">✕</button></div>"
  ).join("");
  let active = todos.filter(t=>!t.done).length;
  document.getElementById("info").textContent = "Активных: "+active+" / Всего: "+todos.length;
}
render();
function addTodo() {
  let v = document.getElementById("inp").value.trim();
  if (v) { todos.push({text:v,done:false}); document.getElementById("inp").value=""; save(); render(); }
}
document.getElementById("addBtn").onclick = addTodo;
document.getElementById("inp").onkeydown = e => { if(e.key==="Enter") addTodo(); };
document.getElementById("list").addEventListener("click", e => {
  let i = +e.target.dataset.i;
  if (e.target.type === "checkbox") { todos[i].done = !todos[i].done; save(); render(); }
  if (e.target.tagName === "BUTTON") { todos.splice(i, 1); save(); render(); }
});
document.querySelector(".filters").addEventListener("click", e => {
  if (e.target.dataset.f) {
    filter = e.target.dataset.f;
    document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    render();
  }
});`,md:"js"},
{t:"Проект: Игра \"Змейка\"",c:"js",th:`<h3>Проект: Змейка</h3><p>Классическая игра на Canvas. Змейка управляется стрелками, ест еду и растёт.</p><h3>Механика</h3><ul><li>Сетка клеток</li><li>Движение по таймеру</li><li>Обработка нажатий клавиш</li><li>Проверка столкновений (стены, тело)</li><li>Генерация еды в случайной позиции</li><li>Счёт игры</li></ul><p>Используем Canvas для рисования и setInterval для игрового цикла.</p>`,cd:`document.body.innerHTML='<style>body{display:flex;flex-direction:column;align-items:center;background:#1a1a2e;color:#fff;font-family:Arial;margin:0;padding:10px}canvas{border:2px solid #6c5ce7;border-radius:5px;margin:10px;touch-action:none}.ctrl{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}.ctrl button{width:50px;height:40px;font-size:18px;border:none;background:#6c5ce7;color:#fff;border-radius:5px;cursor:pointer}</style><h2>Змейка</h2><p id="sc">Счёт: 0</p><canvas id="c" width="300" height="300"></canvas><div class="ctrl"><button onclick="setDir(0,-1)">↑</button><br><button onclick="setDir(-1,0)">←</button><button onclick="setDir(0,1)">↓</button><button onclick="setDir(1,0)">→</button></div>';
var cv=document.getElementById("c"),ctx=cv.getContext("2d"),gs=15,tc=20,snake=[{x:10,y:10}],dir={x:1,y:0},food={x:5,y:5},score=0,alive=true;
function setDir(x,y){if(dir.x!==-x||dir.y!==-y){dir={x,y};}}
document.addEventListener("keydown",e=>{if(e.key==="ArrowUp")setDir(0,-1);if(e.key==="ArrowDown")setDir(0,1);if(e.key==="ArrowLeft")setDir(-1,0);if(e.key==="ArrowRight")setDir(1,0);});
function spawnFood(){food={x:Math.floor(Math.random()*tc),y:Math.floor(Math.random()*tc)};}
function draw(){ctx.fillStyle="#0d0d2b";ctx.fillRect(0,0,cv.width,cv.height);ctx.fillStyle="#e74c3c";ctx.fillRect(food.x*gs,food.y*gs,gs-1,gs-1);snake.forEach((s,i)=>{ctx.fillStyle=i===0?"#00b894":"#2ecc71";ctx.fillRect(s.x*gs,s.y*gs,gs-1,gs-1);});}
function update(){if(!alive)return;let h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(h.x<0||h.x>=tc||h.y<0||h.y>=tc||snake.some(s=>s.x===h.x&&s.y===h.y)){alive=false;ctx.fillStyle="#fff";ctx.font="20px Arial";ctx.fillText("Game Over!",80,150);return;}snake.unshift(h);if(h.x===food.x&&h.y===food.y){score++;document.getElementById("sc").textContent="Счёт: "+score;spawnFood();}else{snake.pop();}draw();}
setInterval(update,150);draw();`,md:"js"}
];
var done=JSON.parse(localStorage.getItem("ld")||"[]");
function updProg(){
let p=done.length/L.length*100;
document.getElementById("pbar").style.width=p+"%";
}
function filterCat(c){
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
renderGrid(c);
}
function renderGrid(cat){
let g=document.getElementById("grid");
g.style.display="grid";
document.getElementById("lessonView").classList.remove("active");
let h="";
L.forEach((l,i)=>{
if(cat&&cat!=="all"&&l.c!==cat)return;
let dn=done.includes(i)?" ✓":"";
h+=`<div class="lesson-card" onclick="openLesson(${i})"><div class="num">#${i+1}${dn}</div><div class="title">${l.t}</div><div class="tag"><span class="cat-label cat-${l.c}">${l.c.toUpperCase()}</span></div></div>`;
});
g.innerHTML=h;
}
function openLesson(i){
let l=L[i];
if(!done.includes(i)){done.push(i);localStorage.setItem("ld",JSON.stringify(done));}
updProg();
document.getElementById("grid").style.display="none";
let v=document.getElementById("lessonView");
v.classList.add("active");
let isJs=l.md==="js";
let editorHtml=isJs?
`<div class="editor-area"><h3>Практика — пишите код:</h3><textarea class="code-editor" id="codeEd">${esc(l.cd)}</textarea><br><button class="run-btn" onclick="runJs()">▶ Запустить</button><button class="reset-btn" onclick="resetCode(${i})">Сбросить</button><div class="js-output" id="jsOut"></div></div>`:
`<div class="editor-area"><h3>Практика — редактируйте HTML/CSS:</h3><textarea class="code-editor" id="codeEd">${esc(l.cd)}</textarea><br><button class="run-btn" onclick="runHtml()">▶ Запустить</button><button class="reset-btn" onclick="resetCode(${i})">Сбросить</button><iframe class="output-frame" id="outFrame" style="height:250px"></iframe></div>`;
v.innerHTML=`<button class="back-btn" onclick="goBack()">← Назад к урокам</button><div class="lesson-content"><h2><span class="cat-label cat-${l.c}">${l.c.toUpperCase()}</span> Урок ${i+1}: ${l.t}</h2>${l.th}</div>${editorHtml}`;
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function runHtml(){
let code=document.getElementById("codeEd").value;
let f=document.getElementById("outFrame");
f.srcdoc=code;
}
function runJs(){
let code=document.getElementById("codeEd").value;
let out=document.getElementById("jsOut");
out.textContent="";
let origLog=console.log;
let logs=[];
console.log=function(){
let args=[].slice.call(arguments).map(a=>typeof a==="object"?JSON.stringify(a):String(a));
logs.push(args.join(" "));
};
try{
let fn=new Function(code);
fn();
}catch(e){logs.push("Ошибка: "+e.message);}
console.log=origLog;
out.textContent=logs.join("\n");
}
function resetCode(i){
document.getElementById("codeEd").value=L[i].cd;
}
function goBack(){renderGrid("all");}
renderGrid("all");
updProg();
</script>
</body>
</html>
