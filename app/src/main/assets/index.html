{t:"Структура HTML",c:"html",th:`<h3>Основы HTML</h3><p>HTML (HyperText Markup Language) — язык разметки веб-страниц. Каждый HTML-документ имеет базовую структуру:</p><pre>&lt;!DOCTYPE html&gt;
&lt;html&gt;
&lt;head&gt;
  &lt;title&gt;Заголовок&lt;/title&gt;
&lt;/head&gt;
&lt;body&gt;
  Содержимое страницы
&lt;/body&gt;
&lt;/html&gt;</pre><p><code>&lt;!DOCTYPE html&gt;</code> — объявляет тип документа HTML5.</p><p><code>&lt;html&gt;</code> — корневой элемент.</p><p><code>&lt;head&gt;</code> — метаданные (заголовок, стили, скрипты).</p><p><code>&lt;body&gt;</code> — видимое содержимое страницы.</p>`,cd:`<!DOCTYPE html>
<html>
<head>
  <title>Моя первая страница</title>
</head>
<body>
  <h1>Привет, мир!</h1>
  <p>Это моя первая HTML-страница.</p>
</body>
</html>`,md:"html"},
{t:"Заголовки и абзацы",c:"html",th:`<h3>Заголовки h1-h6</h3><p>HTML предоставляет 6 уровней заголовков. <code>&lt;h1&gt;</code> — самый важный, <code>&lt;h6&gt;</code> — наименее важный.</p><pre>&lt;h1&gt;Заголовок 1&lt;/h1&gt;
&lt;h2&gt;Заголовок 2&lt;/h2&gt;
&lt;h3&gt;Заголовок 3&lt;/h3&gt;</pre><h3>Абзацы</h3><p>Тег <code>&lt;p&gt;</code> создаёт абзац текста. Браузер автоматически добавляет отступы.</p><p>Тег <code>&lt;br&gt;</code> создаёт перенос строки без нового абзаца.</p><p>Тег <code>&lt;hr&gt;</code> создаёт горизонтальную линию-разделитель.</p>`,cd:`<!DOCTYPE html>
<html><body>
  <h1>Главный заголовок</h1>
  <p>Первый абзац текста.</p>
  <h2>Подзаголовок</h2>
  <p>Второй абзац.<br>Новая строка.</p>
  <hr>
  <h3>Ещё подзаголовок</h3>
  <p>Третий абзац.</p>
</body></html>`,md:"html"},
{t:"Ссылки и изображения",c:"html",th:`<h3>Ссылки</h3><p>Тег <code>&lt;a&gt;</code> создаёт гиперссылку. Атрибут <code>href</code> указывает URL.</p><pre>&lt;a href="https://example.com"&gt;Текст ссылки&lt;/a&gt;</pre><p>Атрибут <code>target="_blank"</code> открывает ссылку в новой вкладке.</p><h3>Изображения</h3><p>Тег <code>&lt;img&gt;</code> — самозакрывающийся тег для вставки изображений.</p><pre>&lt;img src="url" alt="описание" width="200"&gt;</pre><p><code>alt</code> — альтернативный текст (для SEO и доступности).</p>`,cd:`<!DOCTYPE html>
<html><body>
  <h2>Ссылки</h2>
  <a href="https://www.wikipedia.org" target="_blank">Открыть Wikipedia</a>
  <h2>Изображение</h2>
  <img src="https://via.placeholder.com/200x100/6c5ce7/fff?text=HTML" alt="Пример" width="200">
  <p><a href="#top">Якорная ссылка наверх</a></p>
</body></html>`,md:"html"},
{t:"Списки",c:"html",th:`<h3>Маркированный список</h3><p><code>&lt;ul&gt;</code> создаёт маркированный (неупорядоченный) список. Каждый элемент — <code>&lt;li&gt;</code>.</p><h3>Нумерованный список</h3><p><code>&lt;ol&gt;</code> создаёт нумерованный (упорядоченный) список.</p><h3>Вложенные списки</h3><p>Списки можно вкладывать друг в друга.</p><pre>&lt;ul&gt;
  &lt;li&gt;Пункт 1
    &lt;ul&gt;
      &lt;li&gt;Подпункт&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/li&gt;
&lt;/ul&gt;</pre>`,cd:`<!DOCTYPE html>
<html><body>
  <h2>Покупки</h2>
  <ul>
    <li>Молоко</li>
    <li>Хлеб</li>
    <li>Фрукты
      <ul>
        <li>Яблоки</li>
        <li>Бананы</li>
      </ul>
    </li>
  </ul>
  <h2>Рецепт</h2>
  <ol>
    <li>Взять муку</li>
    <li>Добавить воду</li>
    <li>Замесить тесто</li>
  </ol>
</body></html>`,md:"html"},
{t:"Таблицы",c:"html",th:`<h3>Создание таблиц</h3><p><code>&lt;table&gt;</code> — контейнер таблицы.</p><p><code>&lt;tr&gt;</code> — строка таблицы.</p><p><code>&lt;th&gt;</code> — ячейка заголовка (жирный текст, по центру).</p><p><code>&lt;td&gt;</code> — обычная ячейка данных.</p><p>Атрибуты <code>colspan</code> и <code>rowspan</code> объединяют ячейки.</p><pre>&lt;table border="1"&gt;
  &lt;tr&gt;&lt;th&gt;Имя&lt;/th&gt;&lt;th&gt;Возраст&lt;/th&gt;&lt;/tr&gt;
  &lt;tr&gt;&lt;td&gt;Анна&lt;/td&gt;&lt;td&gt;25&lt;/td&gt;&lt;/tr&gt;
&lt;/table&gt;</pre>`,cd:`<!DOCTYPE html>
<html><body>
  <h2>Таблица студентов</h2>
  <table border="1" cellpadding="8" cellspacing="0">
    <tr>
      <th>Имя</th><th>Возраст</th><th>Город</th>
    </tr>
    <tr>
      <td>Анна</td><td>22</td><td>Москва</td>
    </tr>
    <tr>
      <td>Борис</td><td>25</td><td>Питер</td>
    </tr>
    <tr>
      <td colspan="2">Всего: 2 студента</td>
      <td>2 города</td>
    </tr>
  </table>
</body></html>`,md:"html"},
{t:"Формы",c:"html",th:`<h3>Формы HTML</h3><p><code>&lt;form&gt;</code> — контейнер формы. Внутри размещаются элементы ввода.</p><p><code>&lt;input&gt;</code> — поле ввода. Атрибут <code>type</code> определяет тип: text, password, email, number, checkbox, radio, submit.</p><p><code>&lt;textarea&gt;</code> — многострочное поле.</p><p><code>&lt;select&gt;</code> и <code>&lt;option&gt;</code> — выпадающий список.</p><p><code>&lt;label&gt;</code> — подпись к полю, привязывается через <code>for</code>.</p>`,cd:`<!DOCTYPE html>
<html><body>
  <h2>Регистрация</h2>
  <form>
    <label>Имя: <input type="text" placeholder="Ваше имя"></label><br><br>
    <label>Email: <input type="email" placeholder="mail@example.com"></label><br><br>
    <label>Пароль: <input type="password"></label><br><br>
    <label>Возраст: <input type="number" min="1" max="120"></label><br><br>
    <label>Пол:</label>
    <input type="radio" name="g" value="m"> М
    <input type="radio" name="g" value="f"> Ж<br><br>
    <label><input type="checkbox"> Согласен с правилами</label><br><br>
    <select><option>Москва</option><option>Питер</option><option>Казань</option></select><br><br>
    <textarea rows="3" cols="30" placeholder="О себе"></textarea><br><br>
    <button type="submit">Отправить</button>
  </form>
</body></html>`,md:"html"},
{t:"Семантические теги",c:"html",th:`<h3>Семантика HTML5</h3><p>Семантические теги описывают смысл контента:</p><ul><li><code>&lt;header&gt;</code> — шапка страницы/секции</li><li><code>&lt;nav&gt;</code> — навигация</li><li><code>&lt;main&gt;</code> — основное содержимое</li><li><code>&lt;article&gt;</code> — самостоятельная статья</li><li><code>&lt;section&gt;</code> — тематическая секция</li><li><code>&lt;aside&gt;</code> — боковая панель</li><li><code>&lt;footer&gt;</code> — подвал</li></ul><p>Семантика улучшает SEO и доступность.</p>`,cd:`<!DOCTYPE html>
<html><body>
  <header style="background:#333;color:#fff;padding:10px">
    <h1>Мой сайт</h1>
    <nav>
      <a href="#" style="color:#0ff">Главная</a> |
      <a href="#" style="color:#0ff">О нас</a> |
      <a href="#" style="color:#0ff">Контакты</a>
    </nav>
  </header>
  <main style="padding:10px">
    <article>
      <h2>Статья</h2>
      <p>Содержимое статьи.</p>
    </article>
    <section>
      <h2>Секция</h2>
      <p>Дополнительный контент.</p>
    </section>
    <aside style="background:#eee;color:#000;padding:10px">
      <h3>Боковая панель</h3>
      <p>Реклама или ссылки.</p>
    </aside>
  </main>
  <footer style="background:#333;color:#fff;padding:10px;text-align:center">
    &copy; 2024
  </footer>
</body></html>`,md:"html"},
{t:"Мультимедиа: audio и video",c:"html",th:`<h3>Видео</h3><p>Тег <code>&lt;video&gt;</code> встраивает видео. Атрибуты: <code>controls</code>, <code>autoplay</code>, <code>loop</code>, <code>muted</code>, <code>width</code>.</p><pre>&lt;video src="video.mp4" controls width="300"&gt;&lt;/video&gt;</pre><h3>Аудио</h3><p>Тег <code>&lt;audio&gt;</code> встраивает аудио.</p><pre>&lt;audio src="sound.mp3" controls&gt;&lt;/audio&gt;</pre><p>Можно указать несколько источников через <code>&lt;source&gt;</code> для совместимости с браузерами.</p>`,cd:`<!DOCTYPE html>
<html><body>
  <h2>Видео пример</h2>
  <video controls width="300" muted>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    Ваш браузер не поддерживает видео.
  </video>
  <h2>Аудио пример</h2>
  <audio controls>
    <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
    Ваш браузер не поддерживает аудио.
  </audio>
</body></html>`,md:"html"},
{t:"Атрибуты и мета-теги",c:"html",th:`<h3>Глобальные атрибуты</h3><ul><li><code>id</code> — уникальный идентификатор</li><li><code>class</code> — класс для стилей</li><li><code>style</code> — инлайн-стили</li><li><code>title</code> — всплывающая подсказка</li><li><code>hidden</code> — скрыть элемент</li><li><code>data-*</code> — пользовательские данные</li></ul><h3>Мета-теги</h3><p>Размещаются в <code>&lt;head&gt;</code>:</p><pre>&lt;meta charset="UTF-8"&gt;
&lt;meta name="viewport" content="width=device-width,initial-scale=1"&gt;
&lt;meta name="description" content="Описание"&gt;</pre>`,cd:`<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Тестовая страница">
  <title>Атрибуты</title>
</head>
<body>
  <h1 id="main" class="header" title="Наведи на меня!">Наведи мышку</h1>
  <p style="color:red;font-size:20px">Инлайн стили</p>
  <p data-info="секретные данные">Элемент с data-атрибутом</p>
  <p hidden>Этот текст скрыт</p>
  <div title="Подсказка!" style="background:#ff0;padding:10px;color:#000">
    Наведи для подсказки
  </div>
</body></html>`,md:"html"},
{t:"Iframe и встраивание",c:"html",th:`<h3>Iframe</h3><p>Тег <code>&lt;iframe&gt;</code> встраивает другую веб-страницу внутрь текущей.</p><pre>&lt;iframe src="https://example.com" width="100%" height="300"&gt;&lt;/iframe&gt;</pre><p>Атрибуты: <code>src</code>, <code>width</code>, <code>height</code>, <code>frameborder</code>, <code>allow</code>, <code>sandbox</code>.</p><p><code>sandbox</code> ограничивает возможности встроенного контента для безопасности.</p><h3>Встраивание карт и видео</h3><p>YouTube, Google Maps и другие сервисы предоставляют код для встраивания через iframe.</p>`,cd:`<!DOCTYPE html>
<html><body>
  <h2>Встроенная страница</h2>
  <iframe src="https://www.wikipedia.org" width="100%" height="200" style="border:2px solid #333"></iframe>
  <h2>Встроенное содержимое</h2>
  <iframe srcdoc="<h1 style='color:blue'>Привет из iframe!</h1><p>Это контент внутри srcdoc</p>" width="100%" height="100" style="border:2px solid green"></iframe>
</body></html>`,md:"html"},
{t:"CSS: подключение и селекторы",c:"css",th:`<h3>Способы подключения CSS</h3><ul><li>Инлайн: <code>style="color:red"</code></li><li>Внутренний: <code>&lt;style&gt;</code> в <code>&lt;head&gt;</code></li><li>Внешний: <code>&lt;link rel="stylesheet" href="style.css"&gt;</code></li></ul><h3>Селекторы</h3><ul><li><code>p</code> — по тегу</li><li><code>.class</code> — по классу</li><li><code>#id</code> — по id</li><li><code>div p</code> — потомок</li><li><code>div > p</code> — прямой потомок</li><li><code>*</code> — все элементы</li><li><code>a:hover</code> — псевдокласс</li></ul>`,cd:`<!DOCTYPE html>
<html><head><style>
  body{font-family:Arial,sans-serif;padding:20px}
  h1{color:navy}
  .red{color:red}
  #special{background:yellow;padding:5px}
  p.big{font-size:20px}
  ul li{color:green}
  a:hover{color:orange;font-size:18px}
</style></head><body>
  <h1>Селекторы CSS</h1>
  <p class="red">Красный текст через класс</p>
  <p id="special">Жёлтый фон через ID</p>
  <p class="big red">Большой красный</p>
  <ul><li>Зелёный элемент</li><li>Ещё зелёный</li></ul>
  <a href="#">Наведи на ссылку</a>
</body></html>`,md:"html"},
{t:"Цвета и фоны",c:"css",th:`<h3>Цвета в CSS</h3><ul><li>Именованные: <code>red, blue, tomato</code></li><li>HEX: <code>#ff0000, #333</code></li><li>RGB: <code>rgb(255,0,0)</code></li><li>RGBA: <code>rgba(255,0,0,0.5)</code> — с прозрачностью</li><li>HSL: <code>hsl(0,100%,50%)</code></li></ul><h3>Фон</h3><ul><li><code>background-color</code> — цвет фона</li><li><code>background-image</code> — фоновое изображение</li><li><code>background-size: cover</code> — заполнить</li><li><code>background: linear-gradient()</code> — градиент</li></ul>`,cd:`<!DOCTYPE html>
<html><head><style>
  .box{padding:20px;margin:10px;color:#fff;border-radius:8px}
  .b1{background-color:#e74c3c}
  .b2{background-color:rgb(46,204,113)}
  .b3{background-color:rgba(52,152,219,0.7)}
  .b4{background:linear-gradient(45deg,#6c5ce7,#fd79a8)}
  .b5{background:linear-gradient(to right,#f39c12,#e74c3c,#8e44ad)}
  .b6{background:radial-gradient(circle,#00cec9,#0984e3)}
</style></head><body style="background:#1a1a2e;padding:10px">
  <div class="box b1">HEX #e74c3c</div>
  <div class="box b2">RGB зелёный</div>
  <div class="box b3">RGBA полупрозрачный</div>
  <div class="box b4">Линейный градиент</div>
  <div class="box b5">Трёхцветный градиент</div>
  <div class="box b6">Радиальный градиент</div>
</body></html>`,md:"html"},
{t:"Шрифты и текст",c:"css",th:`<h3>Свойства текста</h3><ul><li><code>font-family</code> — семейство шрифта</li><li><code>font-size</code> — размер (px, em, rem, vw)</li><li><code>font-weight</code> — жирность (100-900, bold)</li><li><code>font-style: italic</code> — курсив</li><li><code>text-align</code> — выравнивание (left, center, right, justify)</li><li><code>text-decoration</code> — подчёркивание, зачёркивание</li><li><code>text-transform</code> — uppercase, lowercase, capitalize</li><li><code>letter-spacing</code> — межбуквенный интервал</li><li><code>line-height</code> — межстрочный интервал</li></ul>`,cd:`<!DOCTYPE html>
<html><head><style>
  body{padding:15px;background:#fff;color:#333}
  .s1{font-family:Georgia,serif;font-size:24px}
  .s2{font-family:'Courier New',monospace;font-weight:bold}
  .s3{font-style:italic;text-decoration:underline;color:#e74c3c}
  .s4{text-transform:uppercase;letter-spacing:5px;font-size:14px}
  .s5{text-align:center;line-height:2;background:#eee;padding:10px}
  .s6{text-align:justify;max-width:300px}
  .s7{text-decoration:line-through;color:#999}
  .s8{font-size:2em;text-shadow:2px 2px 4px rgba(0,0,0,0.3)}
</style></head><body>
  <p class="s1">Georgia, 24px</p>
  <p class="s2">Courier New, жирный</p>
  <p class="s3">Курсив с подчёркиванием</p>
  <p class="s4">uppercase + spacing</p>
  <p class="s5">Центрированный текст<br>с увеличенным межстрочным</p>
  <p class="s6">Выравнивание по ширине. Текст растягивается чтобы занять всю ширину блока равномерно.</p>
  <p class="s7">Зачёркнутый текст</p>
  <p class="s8">Тень текста</p>
</body></html>`,md:"html"},
{t:"Блочная модель (Box Model)",c:"css",th:`<h3>Box Model</h3><p>Каждый элемент — прямоугольник из 4 слоёв:</p><ul><li><code>content</code> — содержимое</li><li><code>padding</code> — внутренний отступ</li><li><code>border</code> — граница</li><li><code>margin</code> — внешний отступ</li></ul><p><code>box-sizing: border-box</code> — padding и border входят в width.</p><p><code>width</code> и <code>height</code> задают размер содержимого (или всего блока при border-box).</p>`,cd:`<!DOCTYPE html>
<html><head><style>
  *{box-sizing:border-box}
  body{padding:10px;font-family:Arial}
  .box{background:#3498db;color:#fff;margin:10px 0;text-align:center}
  .b1{width:200px;padding:10px;border:3px solid #2c3e50}
  .b2{width:200px;padding:30px;border:5px dashed #e74c3c}
  .b3{width:80%;padding:20px;margin:20px auto;border:4px solid #2ecc71;border-radius:15px}
  .info{background:#2c3e50;color:#ecf0f1;padding:15px;margin:10px;border:5px solid #e74c3c;width:250px}
</style></head><body>
  <div class="box b1">padding:10px border:3px</div>
  <div class="box b2">padding:30px border:5px dashed</div>
  <div class="box b3">80% ширины, центрирован</div>
  <div class="info">
    <strong>Box Model:</strong><br>
    Content внутри<br>
    + padding: 15px<br>
    + border: 5px<br>
    + margin: 10px
  </div>
</body></html>`,md:"html"},
{t:"Display и позиционирование",c:"css",th:`<h3>Display</h3><ul><li><code>block</code> — блочный, занимает всю ширину</li><li><code>inline</code> — строчный, по содержимому</li><li><code>inline-block</code> — строчный с блочными свойствами</li><li><code>none</code> — скрыть элемент</li></ul><h3>Position</h3><ul><li><code>static</code> — обычный поток (по умолчанию)</li><li><code>relative</code> — сдвиг от обычной позиции</li><li><code>absolute</code> — относительно ближайшего positioned-родителя</li><li><code>fixed</code> — относительно окна браузера</li><li><code>sticky</code> — приклеивается при прокрутке</li></ul>`,cd:`<!DOCTYPE html>
<html><head><style>
  body{padding:10px;font-family:Arial;font-size:14px}
  .inline{display:inline;background:#e74c3c;color:#fff;padding:5px}
  .inblock{display:inline-block;background:#3498db;color:#fff;padding:15px;margin:5px;width:100px;text-align:center}
  .rel{position:relative;left:30px;top:10px;background:#2ecc71;padding:10px;color:#fff;display:inline-block}
  .container{position:relative;background:#eee;height:120px;margin:10px 0}
  .abs{position:absolute;right:10px;bottom:10px;background:#e74c3c;color:#fff;padding:10px}
  .sticky-el{position:sticky;top:0;background:#f39c12;padding:10px;color:#fff}
</style></head><body>
  <h3>Inline</h3>
  <span class="inline">span 1</span><span class="inline">span 2</span>
  <h3>Inline-block</h3>
  <div class="inblock">Блок 1</div><div class="inblock">Блок 2</div><div class="inblock">Блок 3</div>
  <h3>Relative</h3>
  <span class="rel">Сдвинут на 30px вправо</span>
  <h3>Absolute</h3>
  <div class="container">Контейнер relative<div class="abs">absolute</div></div>
  <div class="sticky-el">Sticky элемент (прокрутите)</div>
  <div style="height:200px;padding:10px">Контент для прокрутки...</div>
</body></html>`,md:"html"},
{t:"Flexbox основы",c:"css",th:`<h3>Flexbox</h3><p><code>display:flex</code> превращает контейнер во flex-контейнер.</p><h3>Свойства контейнера</h3><ul><li><code>flex-direction</code>: row, column, row-reverse</li><li><code>justify-content</code>: flex-start, center, space-between, space-around, space-evenly</li><li><code>align-items</code>: stretch, center, flex-start, flex-end</li><li><code>flex-wrap</code>: nowrap, wrap</li><li><code>gap</code>: промежуток между элементами</li></ul><h3>Свойства элементов</h3><ul><li><code>flex-grow</code> — коэффициент роста</li><li><code>flex-shrink</code> — коэффициент сжатия</li><li><code>flex-basis</code> — базовый размер</li></ul>`,cd:`<!DOCTYPE html>
<html><head><style>
  body{padding:10px;font-family:Arial;font-size:13px}
  .flex{display:flex;gap:8px;margin:8px 0;padding:8px;background:#1a1a2e}
  .flex div{background:#6c5ce7;color:#fff;padding:12px;border-radius:5px;text-align:center}
  .center{justify-content:center}
  .between{justify-content:space-between}
  .around{justify-content:space-around}
  .col{flex-direction:column;max-width:150px}
  .wrap{flex-wrap:wrap}
  .wrap div{flex:1 1 80px}
  .grow .g{flex-grow:2}
</style></head><body>
  <h3>justify-content: center</h3>
  <div class="flex center"><div>A</div><div>B</div><div>C</div></div>
  <h3>space-between</h3>
  <div class="flex between"><div>A</div><div>B</div><div>C</div></div>
  <h3>space-around</h3>
  <div class="flex around"><div>A</div><div>B</div><div>C</div></div>
  <h3>column</h3>
  <div class="flex col"><div>A</div><div>B</div><div>C</div></div>
  <h3>flex-wrap</h3>
  <div class="flex wrap"><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div></div>
  <h3>flex-grow</h3>
  <div class="flex grow"><div>1</div><div class="g">grow:2</div><div>3</div></div>
</body></html>`,md:"html"},
{t:"CSS Grid основы",c:"css",th:`<h3>CSS Grid</h3><p><code>display:grid</code> — контейнер-сетка.</p><h3>Свойства контейнера</h3><ul><li><code>grid-template-columns</code> — столбцы</li><li><code>grid-template-rows</code> — строки</li><li><code>gap</code> — промежутки</li><li><code>fr</code> — дробная единица (fraction)</li></ul><h3>Свойства элементов</h3><ul><li><code>grid-column: 1/3</code> — от 1 до 3 линии</li><li><code>grid-row: 1/3</code> — от 1 до 3 строки</li></ul><p><code>repeat(3,1fr)</code> — 3 равных столбца.</p><p><code>minmax(100px,1fr)</code> — от минимума до фракции.</p>`,cd:`<!DOCTYPE html>
<html><head><style>
  body{padding:10px;font-family:Arial;font-size:13px}
  .grid{display:grid;gap:8px;margin:10px 0}
  .grid div{background:#6c5ce7;color:#fff;padding:15px;text-align:center;border-radius:5px}
  .g1{grid-template-columns:1fr 1fr 1fr}
  .g2{grid-template-columns:2fr 1fr;grid-template-rows:60px 60px}
  .g3{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}
  .span2{grid-column:1/3;background:#e74c3c!important}
  .tall{grid-row:1/3;background:#00b894!important}
</style></head><body>
  <h3>3 равных столбца</h3>
  <div class="grid g1"><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div></div>
  <h3>2fr + 1fr, с span</h3>
  <div class="grid g2"><div class="span2">span 2 col</div><div>3</div><div>4</div></div>
  <h3>auto-fill</h3>
  <div class="grid g3"><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div><div>6</div><div>7</div></div>
</body></html>`,md:"html"},
{t:"Анимации CSS",c:"css",th:`<h3>Transitions</h3><p><code>transition</code> — плавное изменение свойств при hover и т.д.</p><pre>transition: all 0.3s ease;</pre><h3>Keyframes</h3><p><code>@keyframes</code> — пошаговая анимация.</p><pre>@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}</pre><p><code>animation: spin 2s linear infinite;</code></p><h3>Transform</h3><ul><li><code>rotate(45deg)</code></li><li><code>scale(1.5)</code></li><li><code>translateX(20px)</code></li><li><code>skew(10deg)</code></li></ul>`,cd:`<!DOCTYPE html>
<html><head><style>
  body{padding:20px;font-family:Arial;background:#1a1a2e;color:#fff}
  .box{width:80px;height:80px;margin:15px;display:inline-block;border-radius:8px;cursor:pointer}
  .b1{background:#e74c3c;transition:transform 0.3s,border-radius 0.3s}
  .b1:hover{transform:scale(1.3) rotate(10deg);border-radius:50%}
  .b2{background:#3498db;transition:all 0.5s}
  .b2:hover{background:#2ecc71;transform:translateX(50px)}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .b3{background:#f39c12;animation:spin 3s linear infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:0.7}}
  .b4{background:#9b59b6;animation:pulse 1.5s ease infinite}
  @keyframes slide{0%{transform:translateX(0)}50%{transform:translateX(100px)}100%{transform:translateX(0)}}
  .b5{background:#1abc9c;animation:slide 2s ease infinite}
</style></head><body>
  <h3>Hover: scale + rotate</h3><div class="box b1"></div>
  <h3>Hover: translate + color</h3><div class="box b2"></div>
  <h3>Вращение</h3><div class="box b3"></div>
  <h3>Пульсация</h3><div class="box b4"></div>
  <h3>Скольжение</h3><div class="box b5"></div>
</body></html>`,md:"html"},
{t:"Адаптивный дизайн",c:"css",th:`<h3>Media Queries</h3><p>Позволяют применять стили в зависимости от размера экрана.</p><pre>@media (max-width: 768px) {
  .container { flex-direction: column; }
}</pre><h3>Единицы</h3><ul><li><code>%</code> — процент от родителя</li><li><code>vw, vh</code> — процент от окна</li><li><code>rem</code> — от font-size корневого элемента</li><li><code>clamp(min, preferred, max)</code></li></ul><h3>Viewport</h3><p><code>&lt;meta name="viewport" content="width=device-width,initial-scale=1"&gt;</code> — обязателен для мобильных.</p>`,cd:`<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{box-sizing:border-box;margin:0}
  body{font-family:Arial;padding:10px}
  h1{font-size:clamp(18px,5vw,32px);text-align:center}
  .cards{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}
  .card{flex:1 1 200px;background:#6c5ce7;color:#fff;padding:20px;border-radius:10px}
  @media(max-width:600px){
    .cards{flex-direction:column}
    .card{text-align:center}
    body{background:#f0f0f0}
  }
  @media(max-width:400px){
    h1{color:#e74c3c}
  }
</style></head><body>
  <h1>Адаптивный дизайн</h1>
  <p style="text-align:center;font-size:14px">Измените ширину окна!</p>
  <div class="cards">
    <div class="card"><h3>Карточка 1</h3><p>Адаптируется под экран</p></div>
    <div class="card" style="background:#00b894"><h3>Карточка 2</h3><p>Flex-wrap помогает</p></div>
    <div class="card" style="background:#e17055"><h3>Карточка 3</h3><p>Media queries рулят</p></div>
  </div>
</body></html>`,md:"html"},
{t:"Псевдоклассы и псевдоэлементы",c:"css",th:`<h3>Псевдоклассы</h3><ul><li><code>:hover</code> — при наведении</li><li><code>:focus</code> — при фокусе</li><li><code>:active</code> — при нажатии</li><li><code>:nth-child(n)</code> — n-й потомок</li><li><code>:first-child</code>, <code>:last-child</code></li><li><code>:not(selector)</code> — исключение</li></ul><h3>Псевдоэлементы</h3><ul><li><code>::before</code> — контент перед элементом</li><li><code>::after</code> — контент после элемента</li><li><code>::first-letter</code> — первая буква</li><li><code>::selection</code> — выделенный текст</li></ul>`,cd:`<!DOCTYPE html>
<html><head><style>
  body{padding:15px;font-family:Arial}
  li{padding:8px;margin:4px 0;list-style:none;background:#eee;transition:.2s}
  li:hover{background:#6c5ce7;color:#fff;transform:translateX(10px)}
  li:nth-child(odd){border-left:4px solid #e74c3c}
  li:nth-child(even){border-left:4px solid #3498db}
  li:first-child{font-weight:bold}
  li:last-child{font-style:italic}
  .fancy::before{content:"★ ";color:gold}
  .fancy::after{content:" ←";color:#999}
  p::first-letter{font-size:2em;color:#e74c3c;font-weight:bold}
  ::selection{background:#6c5ce7;color:#fff}
  input:focus{outline:3px solid #6c5ce7;background:#f0f0ff}
</style></head><body>
  <ul>
    <li>Первый (bold)</li><li>Второй</li>
    <li>Третий</li><li>Четвёртый</li>
    <li>Последний (italic)</li>
  </ul>
  <p class="fancy">Элемент с before/after</p>
  <p>Абзац с увеличенной первой буквой. Выделите текст мышкой!</p>
  <input type="text" placeholder="Кликни для фокуса" style="padding:8px;margin:10px 0">
</body></html>`,md:"html"},
{t:"CSS переменные и calc",c:"css",th:`<h3>CSS переменные (Custom Properties)</h3><p>Объявляются с <code>--</code> и используются через <code>var()</code>.</p><pre>:root {
  --main-color: #6c5ce7;
  --padding: 15px;
}
.box {
  color: var(--main-color);
  padding: var(--padding);
}</pre><h3>calc()</h3><p>Вычисления прямо в CSS:</p><pre>width: calc(100% - 40px);
font-size: calc(14px + 1vw);</pre><p>Можно комбинировать разные единицы.</p>`,cd:`<!DOCTYPE html>
<html><head><style>
  :root{--c1:#6c5ce7;--c2:#00b894;--c3:#e17055;--pad:15px;--rad:10px}
  *{box-sizing:border-box}
  body{padding:var(--pad);font-family:Arial;background:#1a1a2e;color:#fff}
  .box{background:var(--c1);padding:var(--pad);margin:10px 0;border-radius:var(--rad)}
  .box2{background:var(--c2);padding:calc(var(--pad) * 2);margin:10px 0;border-radius:var(--rad)}
  .box3{background:var(--c3);padding:var(--pad);width:calc(100% - 60px);margin:10px auto;border-radius:var(--rad)}
  .dynamic{font-size:calc(12px + 1.5vw);background:#2d3436;padding:15px;border-radius:8px;margin:10px 0}
  .half{display:flex;gap:10px}
  .half div{flex:1;background:var(--c1);padding:var(--pad);border-radius:var(--rad);text-align:center;height:calc(50px + 3vw)}
</style></head><body>
  <h2>CSS переменные</h2>
  <div class="box">padding: var(--pad) = 15px</div>
  <div class="box2">padding: calc(var(--pad)*2) = 30px</div>
  <div class="box3">width: calc(100% - 60px)</div>
  <div class="dynamic">font-size: calc(12px + 1.5vw)</div>
  <div class="half"><div>50%</div><div>50%</div></div>
</body></html>`,md:"html"},
{t:"JavaScript: переменные и типы",c:"js",th:`<h3>Переменные</h3><ul><li><code>let</code> — изменяемая переменная (блочная область)</li><li><code>const</code> — константа (нельзя переприсвоить)</li><li><code>var</code> — устаревший способ (функциональная область)</li></ul><h3>Типы данных</h3><ul><li><code>string</code> — строка: "привет", 'мир', \`шаблон\`</li><li><code>number</code> — число: 42, 3.14</li><li><code>boolean</code> — true/false</li><li><code>null</code> — пустое значение</li><li><code>undefined</code> — не определено</li><li><code>object</code> — объект</li><li><code>array</code> — массив (тип object)</li></ul><p><code>typeof x</code> — узнать тип.</p>`,cd:`let name = "Мир";
const age = 25;
let isStudent = true;
let empty = null;
let x;

console.log("Привет, " + name + "!");
console.log("Возраст:", age);
console.log("Студент:", isStudent);
console.log("Пустое:", empty);
console.log("Неопределено:", x);
console.log("typeof name:", typeof name);
console.log("typeof age:", typeof age);
console.log("typeof isStudent:", typeof isStudent);

let arr = [1, 2, 3];
let obj = {a: 1, b: "текст"};
console.log("Массив:", arr);
console.log("Объект:", obj);
console.log("typeof arr:", typeof arr);
console.log("Array.isArray:", Array.isArray(arr));`,md:"js"},
{t:"Операторы",c:"js",th:`<h3>Арифметические</h3><p><code>+ - * / %</code> — сложение, вычитание, умножение, деление, остаток.</p><p><code>**</code> — возведение в степень.</p><h3>Сравнение</h3><p><code>== !=</code> — с приведением типов.</p><p><code>=== !==</code> — строгое сравнение (без приведения).</p><p><code>> < >= <=</code></p><h3>Логические</h3><p><code>&&</code> — И, <code>||</code> — ИЛИ, <code>!</code> — НЕ.</p><h3>Присваивание</h3><p><code>+= -= *= /=</code></p><p><code>++</code> — инкремент, <code>--</code> — декремент.</p>`,cd:`let a = 10, b = 3;
console.log("a + b =", a + b);
console.log("a - b =", a - b);
console.log("a * b =", a * b);
console.log("a / b =", a / b);
console.log("a % b =", a % b);
console.log("a ** b =", a ** b);

console.log("\\nСравнение:");
console.log("5 == '5':", 5 == '5');
console.log("5 === '5':", 5 === '5');
console.log("5 != '5':", 5 != '5');
console.log("5 !== '5':", 5 !== '5');
console.log("10 > 3:", 10 > 3);
console.log("10 <= 10:", 10 <= 10);

console.log("\\nЛогические:");
console.log("true && false:", true && false);
console.log("true || false:", true || false);
console.log("!true:", !true);

let c = 5;
c += 3;
console.log("\\nc после += 3:", c);
c++;
console.log("c после ++:", c);`,md:"js"},
{t:"Условия if/else и switch",c:"js",th:`<h3>if / else if / else</h3><pre>if (условие) {
  // код
} else if (другое) {
  // код
} else {
  // код
}</pre><h3>Тернарный оператор</h3><pre>let result = age >= 18 ? "взрослый" : "ребёнок";</pre><h3>switch</h3><pre>switch(value) {
  case 1: ...; break;
  case 2: ...; break;
  default: ...;
}</pre>`,cd:`let age = 20;

if (age >= 18) {
  console.log("Совершеннолетний");
} else if (age >= 14) {
  console.log("Подросток");
} else {
  console.log("Ребёнок");
}

let status = age >= 18 ? "взрослый" : "ребёнок";
console.log("Тернарный:", status);

let day = new Date().getDay();
switch(day) {
  case 0: console.log("Воскресенье"); break;
  case 1: console.log("Понедельник"); break;
  case 2: console.log("Вторник"); break;
  case 3: console.log("Среда"); break;
  case 4: console.log("Четверг"); break;
  case 5: console.log("Пятница"); break;
  case 6: console.log("Суббота"); break;
}

let num = 15;
if (num % 3 === 0 && num % 5 === 0) console.log("FizzBuzz");
else if (num % 3 === 0) console.log("Fizz");
else if (num % 5 === 0) console.log("Buzz");
else console.log(num);`,md:"js"},
{t:"Циклы",c:"js",th:`<h3>for</h3><pre>for (let i = 0; i < 5; i++) { ... }</pre><h3>while</h3><pre>while (условие) { ... }</pre><h3>do...while</h3><pre>do { ... } while (условие);</pre><h3>for...of (для массивов)</h3><pre>for (let item of array) { ... }</pre><h3>for...in (для объектов)</h3><pre>for (let key in object) { ... }</pre><p><code>break</code> — выход из цикла. <code>continue</code> — пропуск итерации.</p>`,cd:`console.log("for:");
for (let i = 1; i <= 5; i++) {
  console.log("  i =", i);
}

console.log("\\nwhile:");
let n = 1;
while (n <= 3) {

{t:"Функции",c:"js",th:`<h3>Объявление функции</h3><pre>function greet(name) {
  return "Привет, " + name;
}</pre><h3>Функциональное выражение</h3><pre>const greet = function(name) { ... };</pre><h3>Стрелочные функции</h3><pre>const greet = (name) => "Привет, " + name;
const sum = (a, b) => a + b;</pre><h3>Параметры по умолчанию</h3><pre>function greet(name = "Мир") { ... }</pre><h3>Rest-параметры</h3><pre>function sum(...nums) { ... }</pre>`,cd:`function greet(name) {
  return "Привет, " + name + "!";
}
console.log(greet("Анна"));

const square = function(x) {
  return x * x;
};
console.log("4² =", square(4));

const sum = (a, b) => a + b;
console.log("3 + 5 =", sum(3, 5));

const hello = (name = "Мир") => "Привет, " + name;
console.log(hello());
console.log(hello("Борис"));

function sumAll(...nums) {
  return nums.reduce((s, n) => s + n, 0);
}
console.log("Сумма 1-5:", sumAll(1, 2, 3, 4, 5));

function factorial(n) {
  if (n <= 1) return 1;
  return n * factorial(n - 1);
}
console.log("5! =", factorial(5));

const multiply = (a, b) => {
  let result = a * b;
  return result;
};
console.log("6 * 7 =", multiply(6, 7));`,md:"js"},
{t:"Массивы",c:"js",th:`<h3>Создание</h3><pre>let arr = [1, 2, 3];
let arr2 = new Array(5);</pre><h3>Методы</h3><ul><li><code>push()</code> — добавить в конец</li><li><code>pop()</code> — удалить с конца</li><li><code>unshift()</code> — добавить в начало</li><li><code>shift()</code> — удалить с начала</li><li><code>splice(i, n)</code> — удалить/вставить</li><li><code>slice(start, end)</code> — копия части</li><li><code>indexOf()</code>, <code>includes()</code></li><li><code>forEach()</code>, <code>map()</code>, <code>filter()</code>, <code>reduce()</code></li><li><code>sort()</code>, <code>reverse()</code>, <code>join()</code></li></ul>`,cd:`let fruits = ["яблоко", "банан", "вишня"];
console.log("Массив:", fruits);
console.log("Длина:", fruits.length);
console.log("Первый:", fruits[0]);

fruits.push("дыня");
console.log("После push:", fruits);

fruits.pop();
console.log("После pop:", fruits);

let nums = [5, 3, 8, 1, 9, 2];
console.log("\\nЧисла:", nums);

let doubled = nums.map(n => n * 2);
console.log("map x2:", doubled);

let even = nums.filter(n => n % 2 === 0);
console.log("filter чётные:", even);

let total = nums.reduce((s, n) => s + n, 0);
console.log("reduce сумма:", total);

let sorted = [...nums].sort((a, b) => a - b);
console.log("sort:", sorted);

console.log("includes(8):", nums.includes(8));
console.log("indexOf(3):", nums.indexOf(3));

nums.forEach((n, i) => console.log("  [" + i + "]=" + n));`,md:"js"},
{t:"Объекты",c:"js",th:`<h3>Создание объектов</h3><pre>let user = {
  name: "Анна",
  age: 25,
  greet() { return "Привет!"; }
};</pre><h3>Доступ к свойствам</h3><p><code>user.name</code> или <code>user["name"]</code></p><h3>Методы объектов</h3><ul><li><code>Object.keys(obj)</code> — массив ключей</li><li><code>Object.values(obj)</code> — массив значений</li><li><code>Object.entries(obj)</code> — массив [ключ, значение]</li><li><code>Object.assign()</code> — копирование</li></ul><h3>Деструктуризация</h3><pre>let {name, age} = user;</pre>`,cd:`let user = {
  name: "Анна",
  age: 25,
  city: "Москва",
  greet() {
    return "Привет, я " + this.name;
  }
};

console.log(user.name);
console.log(user["age"]);
console.log(user.greet());

user.email = "anna@mail.ru";
console.log("Добавлено email:", user.email);

console.log("\\nKeys:", Object.keys(user));
console.log("Values:", Object.values(user));

let {name, age, city} = user;
console.log("\\nДеструктуризация:");
console.log(name, age, city);

let copy = {...user, age: 30};
console.log("\\nКопия с изменением:", copy);

for (let [key, val] of Object.entries(user)) {
  if (typeof val !== "function")
    console.log(key + ": " + val);
}`,md:"js"},
{t:"Строки и шаблонные литералы",c:"js",th:`<h3>Методы строк</h3><ul><li><code>length</code> — длина</li><li><code>toUpperCase()</code>, <code>toLowerCase()</code></li><li><code>includes()</code>, <code>startsWith()</code>, <code>endsWith()</code></li><li><code>indexOf()</code>, <code>lastIndexOf()</code></li><li><code>slice(start, end)</code>, <code>substring()</code></li><li><code>split(sep)</code> — разбить в массив</li><li><code>trim()</code> — убрать пробелы</li><li><code>replace()</code>, <code>replaceAll()</code></li><li><code>repeat(n)</code> — повторить</li></ul><h3>Шаблонные литералы</h3><pre>\`Привет, \${name}! Вам \${age} лет.\`</pre>`,cd:`let str = "Привет, JavaScript!";

let name = "Мир";

Через 5 лет будет \${age + 5}.\`;

{t:"DOM: поиск элементов",c:"js",th:`<h3>Document Object Model</h3><p>DOM — дерево объектов HTML-страницы. JavaScript может читать и менять DOM.</p><h3>Методы поиска</h3><ul><li><code>document.getElementById("id")</code></li><li><code>document.querySelector("css")</code> — первый найденный</li><li><code>document.querySelectorAll("css")</code> — все найденные</li><li><code>document.getElementsByClassName("cls")</code></li><li><code>document.getElementsByTagName("tag")</code></li></ul><h3>Свойства элемента</h3><ul><li><code>textContent</code> — текст</li><li><code>innerHTML</code> — HTML внутри</li><li><code>style</code> — инлайн стили</li><li><code>classList</code> — работа с классами</li></ul>`,cd:`document.body.innerHTML = \`
  <h2 id="title">Заголовок</h2>
  <p class="text">Первый абзац</p>
  <p class="text">Второй абзац</p>
  <ul>
    <li>Пункт 1</li>
    <li>Пункт 2</li>
    <li>Пункт 3</li>
  </ul>
  <div id="output"></div>
\`;

let title = document.getElementById("title");
title.style.color = "blue";
title.textContent = "Изменённый заголовок";

let texts = document.querySelectorAll(".text");
texts.forEach((p, i) => {
  p.style.background = i % 2 === 0 ? "#ffe0e0" : "#e0ffe0";
  p.style.padding = "10px";
});

let items = document.querySelectorAll("li");
items.forEach((li, i) => {
  li.style.color = ["red","green","blue"][i];
});

let out = document.getElementById("output");
out.innerHTML = "<strong>Найдено " + texts.length + " абзацев и " + items.length + " пунктов</strong>";`,md:"js"},
{t:"DOM: события",c:"js",th:`<h3>Обработка событий</h3><p><code>element.addEventListener("event", handler)</code></p><h3>Типы событий</h3><ul><li><code>click</code> — клик</li><li><code>dblclick</code> — двойной клик</li><li><code>mouseover</code>, <code>mouseout</code> — наведение</li><li><code>keydown</code>, <code>keyup</code> — клавиатура</li><li><code>input</code>, <code>change</code> — ввод в поле</li><li><code>submit</code> — отправка формы</li><li><code>load</code> — загрузка</li></ul><h3>Объект события</h3><p><code>event.target</code> — элемент, на котором произошло событие.</p><p><code>event.preventDefault()</code> — отменить действие по умолчанию.</p>`,cd:`document.body.innerHTML = \`
  <style>
    body{font-family:Arial;padding:15px}
    button{padding:10px 20px;margin:5px;font-size:14px;cursor:pointer;border:none;color:#fff;border-radius:5px}
    #box{width:100px;height:100px;background:#6c5ce7;margin:15px 0;transition:.3s;border-radius:8px}
    #log{background:#1a1a2e;color:#0f0;padding:10px;font-family:monospace;font-size:12px;min-height:80px;border-radius:5px}
  </style>
  <button id="btn1" style="background:#e74c3c">Клик</button>
  <button id="btn2" style="background:#3498db">Цвет</button>
  <button id="btn3" style="background:#2ecc71">Размер</button>
  <div id="box"></div>
  <input id="inp" placeholder="Печатай здесь" style="padding:8px;width:200px;margin:5px 0">
  <div id="log"></div>
\`;
let log = document.getElementById("log");
let box = document.getElementById("box");
let count = 0;
document.getElementById("btn1").addEventListener("click", () => {
  count++;
  log.textContent += "Клик #" + count + "\\n";
});
document.getElementById("btn2").addEventListener("click", () => {
  let c = "#"+Math.floor(Math.random()*16777215).toString(16);
  box.style.background = c;
  log.textContent += "Цвет: " + c + "\\n";
});
document.getElementById("btn3").addEventListener("click", () => {
  let s = 50 + Math.random() * 150;
  box.style.width = s + "px";
  box.style.height = s + "px";
});
document.getElementById("inp").addEventListener("input", (e) => {
  log.textContent = "Ввод: " + e.target.value;
});`,md:"js"},
{t:"DOM: создание и удаление",c:"js",th:`<h3>Создание элементов</h3><ul><li><code>document.createElement("tag")</code> — создать</li><li><code>parent.appendChild(el)</code> — добавить в конец</li><li><code>parent.insertBefore(el, ref)</code> — вставить перед</li><li><code>parent.removeChild(el)</code> — удалить</li><li><code>el.remove()</code> — удалить себя</li></ul><h3>Изменение</h3><ul><li><code>el.setAttribute("attr", "val")</code></li><li><code>el.classList.add/remove/toggle("cls")</code></li><li><code>el.innerHTML = "..."</code></li><li><code>el.cloneNode(true)</code> — клонировать</li></ul>`,cd:`document.body.innerHTML = \`
  <style>
    body{font-family:Arial;padding:15px}
    button{padding:8px 15px;margin:5px;cursor:pointer;border:none;color:#fff;border-radius:5px}
    #list{list-style:none;padding:0}
    #list li{background:#2d3436;color:#fff;padding:10px;margin:5px 0;border-radius:5px;display:flex;justify-content:space-between;align-items:center}
    .del{background:#e74c3c;color:#fff;border:none;padding:4px 10px;border-radius:3px;cursor:pointer}
  </style>
  <input id="inp" placeholder="Новый пункт" style="padding:8px;width:180px">
  <button style="background:#6c5ce7" id="addBtn">Добавить</button>
  <button style="background:#e74c3c" id="clearBtn">Очистить</button>
  <ul id="list"></ul>
  <p id="count">Элементов: 0</p>
\`;
let list = document.getElementById("list");
let inp = document.getElementById("inp");
function updateCount() {
  document.getElementById("count").textContent = "Элементов: " + list.children.length;
}
function addItem() {
  let text = inp.value.trim();
  if (!text) return;
  let li = document.createElement("li");
  li.textContent = text;
  let btn = document.createElement("button");
  btn.textContent = "✕";
  btn.className = "del";
  btn.onclick = () => { li.remove(); updateCount(); };
  li.appendChild(btn);
  list.appendChild(li);
  inp.value = "";
  updateCount();
}
document.getElementById("addBtn").onclick = addItem;
inp.addEventListener("keydown", e => { if(e.key==="Enter") addItem(); });
document.getElementById("clearBtn").onclick = () => { list.innerHTML = ""; updateCount(); };`,md:"js"},
{t:"Обработка форм в JS",c:"js",th:`<h3>Работа с формами</h3><p>Получение значений: <code>input.value</code>, <code>select.value</code>, <code>checkbox.checked</code>.</p><p>Событие <code>submit</code> на форме, <code>e.preventDefault()</code> отменяет перезагрузку.</p><p>Событие <code>input</code> срабатывает при каждом изменении.</p><p>Событие <code>change</code> срабатывает после потери фокуса.</p><h3>Валидация</h3><p>Можно проверять данные в JS перед отправкой. Используйте условия для проверки длины, формата, обязательных полей.</p>`,cd:`document.body.innerHTML = \`
  <style>
    body{font-family:Arial;padding:15px}
    label{display:block;margin:8px 0 3px}
    input,select,textarea{padding:8px;width:100%;max-width:300px;box-sizing:border-box}
    button{padding:8px 20px;background:#6c5ce7;color:#fff;border:none;border-radius:5px;cursor:pointer;margin-top:10px}
    .error{color:#e74c3c;font-size:12px}
    .success{color:#2ecc71;font-weight:bold}
    #result{margin-top:15px;padding:10px;background:#eee;border-radius:5px;display:none}
  </style>
  <h2>Форма регистрации</h2>
  <form id="form">
    <label>Имя:</label><input id="name" placeholder="Введите имя">
    <span class="error" id="nameErr"></span>
    <label>Email:</label><input id="email" type="email" placeholder="email@example.com">
    <span class="error" id="emailErr"></span>
    <label>Город:</label><select id="city"><option value="">Выберите</option><option>Москва</option><option>Питер</option><option>Казань</option></select>
    <label><input type="checkbox" id="agree"> Согласен с правилами</label>
    <br><button type="submit">Отправить</button>
  </form>
  <div id="result"></div>
\`;
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();
  let ok = true;
  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let city = document.getElementById("city").value;
  let agree = document.getElementById("agree").checked;
  document.getElementById("nameErr").textContent = "";
  document.getElementById("emailErr").textContent = "";
  if (name.length < 2) { document.getElementById("nameErr").textContent = "Минимум 2 символа"; ok = false; }
  if (!email.includes("@")) { document.getElementById("emailErr").textContent = "Некорректный email"; ok = false; }
  if (!agree) { alert("Примите правила!"); ok = false; }
  if (ok) {
    let r = document.getElementById("result");
    r.style.display = "block";
    r.innerHTML = '<span class="success">Данные приняты!</span><br>Имя: ' + name + '<br>Email: ' + email + '<br>Город: ' + (city||"не выбран");
  }
});`,md:"js"},
{t:"Таймеры и интервалы",c:"js",th:`<h3>setTimeout</h3><p>Выполняет код один раз через указанное время (мс).</p><pre>let id = setTimeout(() => { ... }, 1000);
clearTimeout(id);</pre><h3>setInterval</h3><p>Повторяет код через каждые N мс.</p><pre>let id = setInterval(() => { ... }, 1000);
clearInterval(id);</pre><h3>requestAnimationFrame</h3><p>Для плавных анимаций, вызывается перед перерисовкой (≈60 раз/сек).</p>`,cd:`document.body.innerHTML = \`
  <style>
    body{font-family:Arial;padding:15px;text-align:center}
    #clock{font-size:36px;font-family:monospace;color:#6c5ce7;margin:15px}
    #counter{font-size:24px;margin:10px}
    button{padding:8px 15px;margin:5px;cursor:pointer;border:none;color:#fff;border-radius:5px}
    #bar{width:0%;height:20px;background:#00b894;border-radius:10px;transition:width 0.1s}
    .track{background:#eee;border-radius:10px;margin:15px 0;overflow:hidden}
  </style>
  <div id="clock">00:00:00</div>
  <div id="counter">Секунд: 0</div>
  <button style="background:#2ecc71" id="startBtn">Старт</button>
  <button style="background:#e74c3c" id="stopBtn">Стоп</button>
  <button style="background:#3498db" id="resetBtn">Сброс</button>
  <div class="track"><div id="bar"></div></div>
\`;
let sec = 0, iv = null;
function updateClock() {
  let d = new Date();
  document.getElementById("clock").textContent = d.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();
document.getElementById("startBtn").onclick = () => {
  if (iv) return;
  iv = setInterval(() => {
    sec++;
    document.getElementById("counter").textContent = "Секунд: " + sec;
    document.getElementById("bar").style.width = (sec % 100) + "%";
  }, 1000);
};
document.getElementById("stopBtn").onclick = () => { clearInterval(iv); iv = null; };
document.getElementById("resetBtn").onclick = () => { clearInterval(iv); iv = null; sec = 0; document.getElementById("counter").textContent = "Секунд: 0"; document.getElementById("bar").style.width = "0%"; };`,md:"js"},
{t:"Math и Date",c:"js",th:`<h3>Math</h3><ul><li><code>Math.PI</code> — 3.14159...</li><li><code>Math.round(x)</code> — округление</li><li><code>Math.floor(x)</code>, <code>Math.ceil(x)</code></li><li><code>Math.random()</code> — случайное [0, 1)</li><li><code>Math.max()</code>, <code>Math.min()</code></li><li><code>Math.abs(x)</code>, <code>Math.sqrt(x)</code>, <code>Math.pow(x,n)</code></li></ul><h3>Date</h3><ul><li><code>new Date()</code> — текущая дата</li><li><code>getFullYear()</code>, <code>getMonth()</code> (0-11), <code>getDate()</code></li><li><code>getHours()</code>, <code>getMinutes()</code>, <code>getSeconds()</code></li><li><code>toLocaleDateString()</code>, <code>toLocaleTimeString()</code></li></ul>`,cd:`console.log("=== Math ===");

console.log("floor(4.7):", Math.floor(4.7));
console.log("ceil(4.2):", Math.ceil(4.2));
console.log("sqrt(16):", Math.sqrt(16));
console.log("pow(2,10):", Math.pow(2, 10));
console.log("abs(-5):", Math.abs(-5));
console.log("max(3,7,2):", Math.max(3, 7, 2));
console.log("min(3,7,2):", Math.min(3, 7, 2));

console.log("\\nСлучайные числа:");
for (let i = 0; i < 5; i++) {
  let rnd = Math.floor(Math.random() * 100) + 1;
  console.log("  Случайное 1-100:", rnd);
}

console.log("\\n=== Date ===");
let now = new Date();
console.log("Сейчас:", now.toLocaleString());
console.log("Год:", now.getFullYear());

let bday = new Date(2000, 0, 15);
let age = now.getFullYear() - bday.getFullYear();
console.log("\\nВозраст с 15.01.2000:", age, "лет");`,md:"js"},
{t:"Деструктуризация и spread",c:"js",th:`<h3>Деструктуризация массива</h3><pre>let [a, b, c] = [1, 2, 3];
let [first, ...rest] = [1, 2, 3, 4];</pre><h3>Деструктуризация объекта</h3><pre>let {name, age} = {name: "Анна", age: 25};
let {name: n, age: a} = user; // переименование</pre><h3>Spread оператор (...)</h3><pre>let arr2 = [...arr1, 4, 5];
let obj2 = {...obj1, newProp: "val"};</pre><h3>Rest в функциях</h3><pre>function sum(...nums) { ... }</pre>`,cd:`let [a, b, c] = [10, 20, 30];
console.log("a:", a, "b:", b, "c:", c);

let [first, ...rest] = [1, 2, 3, 4, 5];
console.log("first:", first, "rest:", rest);

let [x, , z] = [1, 2, 3];
console.log("Пропуск: x:", x, "z:", z);

let user = {name: "Анна", age: 25, city: "Москва"};
let {name, age, city} = user;
console.log("\\n" + name, age, city);

let {name: n, age: a2} = user;
console.log("Переименование:", n, a2);

let arr1 = [1, 2, 3];
let arr2 = [...arr1, 4, 5, 6];
console.log("\\nSpread массив:", arr2);

let obj1 = {a: 1, b: 2};
let obj2 = {...obj1, c: 3, b: 99};
console.log("Spread объект:", obj2);

function info({name, age}) {
  return name + " - " + age + " лет";
}
console.log("\\n" + info(user));

let [p, q] = [1, 2];
[q, p] = [p, q];
console.log("Swap:", p, q);`,md:"js"},
{t:"Замыкания и область видимости",c:"js",th:`<h3>Область видимости</h3><ul><li>Глобальная — переменные вне функций</li><li>Функциональная — внутри функции</li><li>Блочная — let/const внутри {}</li></ul><h3>Замыкание (Closure)</h3><p>Функция "запоминает" переменные из внешней области, даже после завершения внешней функции.</p><pre>function counter() {
  let count = 0;
  return function() {
    count++;
    return count;
  };
}
let inc = counter();
inc(); // 1
inc(); // 2</pre><p>Замыкания — основа для приватных переменных и фабрик.</p>`,cd:`function createCounter(start = 0) {
  let count = start;
  return {
    increment() { return ++count; },
    decrement() { return --count; },
    getCount() { return count; },
    reset() { count = start; return count; }
  };
}

let counter = createCounter(10);
console.log("Старт:", counter.getCount());
console.log("++:", counter.increment());
console.log("++:", counter.increment());
console.log("++:", counter.increment());
console.log("--:", counter.decrement());
console.log("Reset:", counter.reset());

function multiplier(factor) {
  return function(num) {
    return num * factor;
  };
}

let double = multiplier(2);
let triple = multiplier(3);
console.log("\\ndouble(5):", double(5));
console.log("triple(5):", triple(5));

function greetMaker(greeting) {
  return function(name) {
    return greeting + ", " + name + "!";
  };
}
let hi = greetMaker("Привет");
let bye = greetMaker("Пока");
console.log("\\n" + hi("Анна"));
console.log(bye("Борис"));`,md:"js"},
{t:"Классы и ООП",c:"js",th:`<h3>Классы ES6</h3><pre>class Animal {
  constructor(name) {
    this.name = name;
  }
  speak() {
    return this.name + " издаёт звук";
  }
}
class Dog extends Animal {
  speak() {
    return this.name + " лает";
  }
}</pre><h3>Ключевые концепции</h3><ul><li><code>constructor</code> — конструктор</li><li><code>extends</code> — наследование</li><li><code>super</code> — вызов родителя</li><li><code>static</code> — статические методы</li><li>Геттеры и сеттеры: <code>get</code>, <code>set</code></li></ul>`,cd:`class Animal {
  constructor(name, sound) {
    this.name = name;
    this.sound = sound;
  }
  speak() {
    return this.name + ": " + this.sound + "!";
  }
  toString() {
    return "[Animal: " + this.name + "]";
  }
}

class Dog extends Animal {
  constructor(name, breed) {
    super(name, "Гав");
    this.breed = breed;
  }
  info() {
    return this.name + " (" + this.breed + ")";
  }
}

class Cat extends Animal {
  constructor(name) {
    super(name, "Мяу");
  }
  purr() { return this.name + " мурлычет..."; }
}

let d = new Dog("Бобик", "Хаски");
let c = new Cat("Мурка");

console.log(d.speak());
console.log(d.info());
console.log(c.speak());
console.log(c.purr());

class Calculator {
  static add(a, b) { return a + b; }
  static mul(a, b) { return a * b; }
}
console.log("\\nCalc.add(3,4):", Calculator.add(3, 4));
console.log("Calc.mul(3,4):", Calculator.mul(3, 4));

class Temp {
  constructor(celsius) { this._c = celsius; }
  get fahrenheit() { return this._c * 9/5 + 32; }
  set fahrenheit(f) { this._c = (f - 32) * 5/9; }
  get celsius() { return this._c; }
}
let t = new Temp(100);
console.log("\\n100°C =", t.fahrenheit + "°F");
t.fahrenheit = 32;
console.log("32°F =", t.celsius + "°C");`,md:"js"},
{t:"Промисы и async/await",c:"js",th:`<h3>Promise</h3><p>Обёртка для асинхронной операции. Может быть fulfilled (выполнен) или rejected (отклонён).</p><pre>let p = new Promise((resolve, reject) => {
  setTimeout(() => resolve("Готово!"), 1000);
});
p.then(result => console.log(result))
 .catch(err => console.log(err));</pre><h3>async/await</h3><pre>async function getData() {
  let result = await somePromise;
  return result;
}</pre><p><code>await</code> приостанавливает выполнение до завершения промиса.</p><h3>Promise.all</h3><p>Ждёт завершения всех промисов одновременно.</p>`,cd:`function delay(ms, val) {
  return new Promise(resolve => {
    setTimeout(() => resolve(val), ms);
  });
}

delay(500, "Первый").then(r => {
  console.log(r + " (через 500мс)");
  return delay(500, "Второй");
}).then(r => {
  console.log(r + " (ещё 500мс)");
});

async function run() {
  console.log("\\nasync/await:");
  let a = await delay(300, "Async A");
  console.log(a);
  let b = await delay(300, "Async B");
  console.log(b);

  console.log("\\nPromise.all:");
  let results = await Promise.all([
    delay(200, "P1"),
    delay(300, "P2"),
    delay(100, "P3")
  ]);
  console.log("Все:", results);
}
run();

let failing = new Promise((resolve, reject) => {
  setTimeout(() => reject("Ошибка!"), 800);
});
failing.catch(err => console.log("\\nПойманная ошибка:", err));`,md:"js"},
{t:"Fetch API",c:"js",th:`<h3>Fetch</h3><p><code>fetch(url)</code> — делает HTTP-запрос, возвращает Promise.</p><pre>fetch("https://api.example.com/data")
  .then(response => response.json())
  .then(data => console.log(data))
  .catch(err => console.log(err));</pre><h3>С async/await</h3><pre>async function getData() {
  let res = await fetch(url);
  let data = await res.json();
  return data;
}</pre><h3>Методы Response</h3><ul><li><code>.json()</code> — парсит JSON</li><li><code>.text()</code> — текст</li><li><code>.ok</code> — успешен ли (200-299)</li><li><code>.status</code> — код ответа</li></ul>`,cd:`async function fetchUsers() {
  try {
    console.log("Загрузка данных...");
    let res = await fetch("https://jsonplaceholder.typicode.com/users?_limit=5");
    if (!res.ok) throw new Error("HTTP " + res.status);
    let users = await res.json();
    console.log("Получено пользователей:", users.length);
    users.forEach(u => {
      console.log("  " + u.name + " - " + u.email + " (" + u.company.name + ")");
    });
  } catch(e) {
    console.log("Ошибка:", e.message);
  }
}
fetchUsers();

async function fetchPost() {
  let res = await fetch("https://jsonplaceholder.typicode.com/posts/1");
  let post = await res.json();
  console.log("\\nПост #" + post.id);
  console.log("Заголовок:", post.title);
  console.log("Текст:", post.body.substring(0, 60) + "...");
}
fetchPost();`,md:"js"},
{t:"LocalStorage",c:"js",th:`<h3>localStorage</h3><p>Хранит данные в браузере (сохраняются после закрытия).</p><h3>Методы</h3><ul><li><code>localStorage.setItem("key", "value")</code></li><li><code>localStorage.getItem("key")</code></li><li><code>localStorage.removeItem("key")</code></li><li><code>localStorage.clear()</code></li></ul><p>Хранит только строки. Для объектов используйте <code>JSON.stringify()</code> и <code>JSON.parse()</code>.</p><h3>sessionStorage</h3><p>Аналогичен, но данные удаляются при закрытии вкладки.</p>`,cd:`localStorage.setItem("name", "Анна");
localStorage.setItem("age", "25");

let name = localStorage.getItem("name");
let age = localStorage.getItem("age");
console.log("Из localStorage:", name, age);

let todos = [
  {text: "Выучить HTML", done: true},
  {text: "Выучить CSS", done: true},
  {text: "Выучить JS", done: false}
];
localStorage.setItem("todos", JSON.stringify(todos));

let loaded = JSON.parse(localStorage.getItem("todos"));
console.log("\\nЗагруженные задачи:");
loaded.forEach(t => {
  console.log((t.done ? "✓" : "○") + " " + t.text);
});

console.log("\\nВсе ключи в localStorage:");
for (let i = 0; i < localStorage.length; i++) {
  let key = localStorage.key(i);
  console.log("  " + key + ": " + localStorage.getItem(key).substring(0, 50));
}

localStorage.removeItem("name");
console.log("\\nПосле удаления name:", localStorage.getItem("name"));`,md:"js"},
{t:"Обработка ошибок",c:"js",th:`<h3>try...catch...finally</h3><pre>try {
  // опасный код
} catch (error) {
  console.log(error.message);
} finally {
  // выполнится всегда
}</pre><h3>throw</h3><p>Бросить свою ошибку: <code>throw new Error("текст")</code></p><h3>Типы ошибок</h3><ul><li><code>Error</code> — базовый</li><li><code>TypeError</code> — неверный тип</li><li><code>RangeError</code> — вне диапазона</li><li><code>ReferenceError</code> — переменная не найдена</li><li><code>SyntaxError</code> — синтаксис</li></ul>`,cd:`function divide(a, b) {
  if (typeof a !== "number" || typeof b !== "number") {
    throw new TypeError("Аргументы должны быть числами");
  }
  if (b === 0) {
    throw new RangeError("Деление на ноль!");
  }
  return a / b;
}

try {
  console.log("10 / 2 =", divide(10, 2));
  console.log("10 / 0 =", divide(10, 0));
} catch(e) {
  console.log("Ошибка:", e.constructor.name);
  console.log("Сообщение:", e.message);
} finally {
  console.log("finally: выполняется всегда");
}

console.log("");

try {
  divide("abc", 5);
} catch(e) {
  console.log("TypeError:", e.message);
}

try {
  JSON.parse("{bad json}");
} catch(e) {
  console.log("\\nJSON ошибка:", e.message);
}

function validate(age) {
  if (age < 0 || age > 150) throw new RangeError("Некорректный возраст: " + age);
  return "Возраст " + age + " принят";
}

try {
  console.log("\\n" + validate(25));
  console.log(validate(200));
} catch(e) {
  console.log("Ошибка:", e.message);
}`,md:"js"},
{t:"Map, Set и Symbol",c:"js",th:`<h3>Map</h3><p>Коллекция пар ключ-значение. Ключом может быть любой тип.</p><ul><li><code>new Map()</code>, <code>set(k,v)</code>, <code>get(k)</code>, <code>has(k)</code>, <code>delete(k)</code>, <code>size</code></li></ul><h3>Set</h3><p>Коллекция уникальных значений.</p><ul><li><code>new Set()</code>, <code>add(v)</code>, <code>has(v)</code>, <code>delete(v)</code>, <code>size</code></li></ul><h3>Symbol</h3><p>Уникальный идентификатор. <code>Symbol("desc")</code> — всегда уникален.</p>`,cd:`let map = new Map();
map.set("name", "Анна");
map.set("age", 25);
map.set(true, "да");
map.set(42, "ответ");

console.log("Map:");
console.log("name:", map.get("name"));
console.log("size:", map.size);
console.log("has age:", map.has("age"));

map.forEach((val, key) => {
  console.log("  " + key + " => " + val);
});

console.log("\\nSet:");
let nums = [1, 2, 3, 2, 1, 4, 5, 4];
let unique = new Set(nums);
console.log("Исходный:", nums);
console.log("Уникальные:", [...unique]);
console.log("size:", unique.size);

unique.add(6);
unique.delete(1);
console.log("После add(6), delete(1):", [...unique]);

let set1 = new Set([1, 2, 3, 4]);
let set2 = new Set([3, 4, 5, 6]);
let union = new Set([...set1, ...set2]);
let inter = new Set([...set1].filter(x => set2.has(x)));
console.log("\\nОбъединение:", [...union]);
console.log("Пересечение:", [...inter]);

let s1 = Symbol("id");
let s2 = Symbol("id");

console.log("s1 === s2:", s1 === s2);`,md:"js"},
{t:"Модули и шаблоны проектирования",c:"js",th:`<h3>Модули ES6</h3><p>В реальных проектах код разделяют на модули:</p><pre>// math.js
export function sum(a, b) { return a + b; }
export const PI = 3.14159;

// app.js
import { sum, PI } from './math.js';</pre><h3>Паттерны</h3><ul><li><b>Module Pattern</b> — инкапсуляция через замыкание</li><li><b>Observer</b> — подписка на события</li><li><b>Singleton</b> — единственный экземпляр</li><li><b>Factory</b> — создание объектов</li></ul>`,cd:`const MathModule = (() => {
  const PI = 3.14159;
  function sum(a, b) { return a + b; }
  function circleArea(r) { return PI * r * r; }
  return { sum, circleArea, PI };
})();

console.log("Module Pattern:");
console.log("PI:", MathModule.PI);
console.log("sum(3,4):", MathModule.sum(3, 4));
console.log("circleArea(5):", MathModule.circleArea(5).toFixed(2));

class EventEmitter {
  constructor() { this.events = {}; }
  on(event, fn) {
    if (!this.events[event]) this.events[event] = [];
    this.events[event].push(fn);
  }
  emit(event, data) {
    (this.events[event] || []).forEach(fn => fn(data));
  }
}

let emitter = new EventEmitter();
emitter.on("message", data => console.log("\\nСообщение:", data));
emitter.on("message", data => console.log("Лог:", data.toUpperCase()));
emitter.emit("message", "Привет, Observer!");

function createUser(type, name) {
  switch(type) {
    case "admin": return { name, role: "admin", permissions: "all" };
    case "user": return { name, role: "user", permissions: "read" };
    default: return { name, role: "guest", permissions: "none" };
  }
}
console.log("\\nFactory:");
console.log(createUser("admin", "Анна"));
console.log(createUser("user", "Борис"));
console.log(createUser("guest", "Гость"));`,md:"js"},
{t:"Регулярные выражения",c:"js",th:`<h3>RegExp</h3><p>Шаблоны для поиска и замены текста.</p><pre>let re = /паттерн/флаги;
let re2 = new RegExp("паттерн", "флаги");</pre><h3>Флаги</h3><ul><li><code>g</code> — глобальный поиск</li><li><code>i</code> — без учёта регистра</li><li><code>m</code> — многострочный</li></ul><h3>Спецсимволы</h3><ul><li><code>\\d</code> — цифра, <code>\\w</code> — буква/цифра, <code>\\s</code> — пробел</li><li><code>.</code> — любой символ, <code>+</code> — 1+, <code>*</code> — 0+, <code>?</code> — 0 или 1</li><li><code>[abc]</code> — один из, <code>(abc)</code> — группа</li></ul><h3>Методы</h3><p><code>test()</code>, <code>match()</code>, <code>replace()</code>, <code>search()</code>, <code>split()</code></p>`,cd:`let email = "test@example.com";
let emailRe = /^[\\w.-]+@[\\w.-]+\\.\\w{2,}$/;
console.log("Email валиден:", emailRe.test(email));
console.log("bad@:", emailRe.test("bad@"));

let phone = "+7 (999) 123-45-67";

let text = "Кот кошка КОШКИ котёнок";
let cats = text.match(/кот/gi);
console.log("\\nНайдены 'кот':", cats);

let str = "Сегодня 25.12.2024 и вчера 24.12.2024";
let dates = str.match(/\\d{2}\\.\\d{2}\\.\\d{4}/g);

let html = "<p>Текст</p><b>Жирный</b>";
let clean = html.replace(/<[^>]+>/g, "");
console.log("\\nБез тегов:", clean);

let csv = "Анна,25,Москва;Борис,30,Питер";
let rows = csv.split(";").map(r => r.split(","));
console.log("\\nCSV:", rows);

let pass = "MyPass123!";
let strong = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d).{8,}$/.test(pass);
console.log("\\nПароль сильный:", strong);`,md:"js"},
{t:"Canvas рисование",c:"js",th:`<h3>HTML Canvas</h3><p>Элемент <code>&lt;canvas&gt;</code> позволяет рисовать графику через JavaScript.</p><pre>&lt;canvas id="c" width="300" height="200"&gt;&lt;/canvas&gt;
let ctx = c.getContext("2d");</pre><h3>Методы</h3><ul><li><code>fillRect(x,y,w,h)</code> — закрашенный прямоугольник</li><li><code>strokeRect(x,y,w,h)</code> — контур</li><li><code>fillStyle</code>, <code>strokeStyle</code> — цвет</li><li><code>beginPath()</code>, <code>moveTo()</code>, <code>lineTo()</code>, <code>arc()</code></li><li><code>fillText(text,x,y)</code> — текст</li><li><code>fill()</code>, <code>stroke()</code></li></ul>`,cd:`document.body.innerHTML = '<canvas id="c" width="300" height="280" style="border:1px solid #333;background:#fff;display:block;margin:10px auto"></canvas>';
let ctx = document.getElementById("c").getContext("2d");

ctx.fillStyle = "#6c5ce7";
ctx.fillRect(10, 10, 80, 60);

ctx.strokeStyle = "#e74c3c";
ctx.lineWidth = 3;
ctx.strokeRect(110, 10, 80, 60);

ctx.fillStyle = "#2ecc71";
ctx.beginPath();
ctx.arc(250, 40, 30, 0, Math.PI * 2);
ctx.fill();

ctx.strokeStyle = "#3498db";
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(10, 100);
ctx.lineTo(100, 150);
ctx.lineTo(10, 150);
ctx.closePath();
ctx.stroke();

ctx.fillStyle = "#e74c3c";
ctx.beginPath();
ctx.moveTo(130, 100);
ctx.lineTo(200, 100);
ctx.lineTo(165, 155);
ctx.closePath();
ctx.fill();

let gradient = ctx.createLinearGradient(10, 170, 290, 170);
gradient.addColorStop(0, "#6c5ce7");
gradient.addColorStop(0.5, "#fd79a8");
gradient.addColorStop(1, "#fdcb6e");
ctx.fillStyle = gradient;
ctx.fillRect(10, 170, 280, 40);

for (let i = 0; i < 10; i++) {

{t:"Анимация на Canvas",c:"js",th:`<h3>Анимация</h3><p>Используем <code>requestAnimationFrame</code> для плавной анимации на Canvas.</p><pre>function animate() {
  ctx.clearRect(0, 0, w, h);
  // рисуем кадр
  requestAnimationFrame(animate);
}
animate();</pre><p>Каждый кадр очищаем холст и рисуем заново с обновлёнными координатами.</p><h3>Принципы</h3><ul><li>Обновление позиции/размера каждый кадр</li><li>Проверка границ (столкновения со стенами)</li><li>Скорость и направление движения</li></ul>`,cd:`document.body.innerHTML = '<canvas id="c" width="300" height="250" style="border:1px solid #333;background:#1a1a2e;display:block;margin:10px auto"></canvas>';
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");
let W = canvas.width, H = canvas.height;
let balls = [];
for (let i = 0; i < 12; i++) {
  balls.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: 8 + Math.random() * 15,
    dx: (Math.random() - 0.5) * 4,
    dy: (Math.random() - 0.5) * 4,
    color: "hsl(" + Math.floor(Math.random()*360) + ",70%,60%)"
  });
}
function animate() {
  ctx.clearRect(0, 0, W, H);
  balls.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
    if (b.x - b.r < 0 || b.x + b.r > W) b.dx *= -1;
    if (b.y - b.r < 0 || b.y + b.r > H) b.dy *= -1;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = b.color;
    ctx.fill();
  });
  ctx.fillStyle = "#fff";
  ctx.font = "12px Arial";
  ctx.fillText("Шариков: " + balls.length, 10, 20);
  requestAnimationFrame(animate);
}
animate();`,md:"js"},
{t:"Flexbox: практика layout",c:"css",th:`<h3>Практический макет на Flexbox</h3><p>Создадим типичный макет сайта: шапка, навигация, основной контент с сайдбаром и подвал.</p><p>Flex позволяет легко создавать адаптивные макеты без float и position.</p><h3>Советы</h3><ul><li>Используйте <code>flex-wrap: wrap</code> для адаптивности</li><li><code>flex: 1</code> заставляет элемент растягиваться</li><li><code>min-height: 100vh</code> для полноэкранного макета</li><li>Комбинируйте с media queries</li></ul>`,cd:`<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Arial;display:flex;flex-direction:column;min-height:100vh}
  header{background:#2d3436;color:#fff;padding:15px;text-align:center}
  nav{background:#6c5ce7;display:flex;justify-content:center;gap:15px;padding:10px;flex-wrap:wrap}
  nav a{color:#fff;text-decoration:none;padding:5px 10px;border-radius:5px}
  nav a:hover{background:rgba(255,255,255,0.2)}
  .content{display:flex;flex:1;gap:10px;padding:10px;flex-wrap:wrap}
  main{flex:3;min-width:200px;background:#f0f0f0;padding:15px;border-radius:8px}
  aside{flex:1;min-width:150px;background:#dfe6e9;padding:15px;border-radius:8px}
  footer{background:#2d3436;color:#fff;text-align:center;padding:12px}
