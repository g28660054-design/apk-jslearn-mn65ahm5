name: Build APK
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "debug or release"
        required: true
        default: "debug"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - uses: android-actions/setup-android@v3
      - name: Accept licenses
        run: yes | sdkmanager --licenses || true
      - name: Install platform
        run: sdkmanager "platforms;android-33" "build-tools;33.0.2"
      - name: Download Gradle wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v7.6.4/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
      - name: Ensure keystore exists
        run: |
          if [ ! -f app/release.jks ]; then
            echo "Keystore not found in repo, generating fallback..."
            keytool -genkeypair -v \
              -keystore app/release.jks \
              -alias apkbuilder \
              -keyalg RSA -keysize 2048 \
              -validity 9999 \
              -storepass apkbuilder123 \
              -keypass apkbuilder123 \
              -dname "CN=APKBuilder,OU=Auto,O=Auto,L=City,S=State,C=US"
          else
            echo "Keystore found in repo, reusing existing key"
          fi
      - name: Build APK
        run: |
          chmod +x gradlew
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --stacktrace
          else
            ./gradlew assembleDebug --stacktrace
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type }}
          path: app/build/outputs/apk/${{ github.event.inputs.build_type }}/*.apk
          retention-days: 7
